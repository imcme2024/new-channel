<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f3f4f6 100%);min-height:100vh;padding:8px;font-size:14px;}

.green{background:#059669;}.green-light{background:#d1fae5;}.green-text{color:#059669;}
.teal{background:#0d9488;}.teal-light{background:#ccfbf1;}.teal-text{color:#0d9488;}

/* 同期ステータスバー */
.sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;margin-top:4px;}
.sync-status{font-weight:600;}
.sync-status.synced{color:#059669;}
.sync-status.syncing{color:#f59e0b;}
.sync-status.error{color:#dc2626;}
.sync-status.offline{color:#6b7280;}

.token-banner{display:none;position:sticky;top:0;z-index:300;background:#dc2626;color:#fff;padding:10px 16px;font-size:13px;font-weight:700;text-align:center;border-radius:0 0 8px 8px;box-shadow:0 4px 8px rgba(220,38,38,0.4);}
.token-banner.show{display:block;}
.token-banner span{color:#fde68a;text-decoration:underline;cursor:pointer;}

.btn-save-next{
  padding:10px 20px;border:none;border-radius:10px;font-weight:700;font-size:15px;
  cursor:pointer;transition:all 0.2s;font-family:inherit;
  background:linear-gradient(135deg,#16a34a,#15803d);
  color:#fff;
  box-shadow:0 3px 10px rgba(22,163,74,0.45);
  letter-spacing:0.02em;
}
.btn-save-next:not(:disabled):hover{
  background:linear-gradient(135deg,#15803d,#166534);
  transform:translateY(-2px);
  box-shadow:0 6px 16px rgba(22,163,74,0.55);
}
.btn-save-next:disabled{
  background:#d1d5db;color:#9ca3af;
  box-shadow:none;cursor:not-allowed;
  transform:none;
}

.loading-overlay{
  position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e3a5f);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:20px;
}
.loading-spinner{
  width:52px;height:52px;border:5px solid rgba(255,255,255,0.2);
  border-top-color:#38bdf8;border-radius:50%;
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:#e0f2fe;font-size:16px;font-weight:600;letter-spacing:0.04em;}
.loading-sub{color:#7dd3fc;font-size:13px;}

.sync-toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:#065f46;color:#fff;padding:12px 24px;border-radius:12px;
  font-size:14px;font-weight:700;z-index:8000;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;
}
.sync-toast.show{transform:translateX(-50%) translateY(0);}
</style>

const PERMANENT_CHANNELS=new Set(['6051','2046','2049']);

let state={
  currentWardKey:'W7',currentMonitorIndex:0,currentChannelIndex:0,
  checkData:{},roomNumberSuffix:'',showSummary:false,currentInput:emptyInput(),
  pendingMonitorChange:false,
  inputConfirmed:false  // ← テキスト入力をEnterで確定したかどうか
};

function emptyInput(){
  return{patientName:'',spo2Alarm:false,electrodeCheck:false,batteryChange:false,
    signalLost:false,tempAbsent:false,admitDischargeError:false,spo2Only:false,remarks:''};
}

// ============================================================
// Google Drive 連携 変数
// ============================================================
let gdriveToken=null,gdriveFileId=null,lastSyncTime='';
const GDRIVE_FILE_NAME='monitor-round-data.json';
const SYNC_INTERVALS=[30*1000, 2*60*1000, 10*60*1000];
let syncFailCount=0,syncTimer=null;
function getSyncInterval(){return SYNC_INTERVALS[Math.min(syncFailCount,SYNC_INTERVALS.length-1)];}

function showLoadingOverlay(msg,sub){
  let el=document.getElementById('loading-overlay');
  if(!el){el=document.createElement('div');el.id='loading-overlay';el.className='loading-overlay';document.body.appendChild(el);}
  el.innerHTML=`<div class="loading-spinner"></div><div class="loading-text">${msg||'データを同期中...'}</div><div class="loading-sub">${sub||'最新のデータに更新しています'}</div>`;
  el.style.display='flex';
}
function hideLoadingOverlay(){const el=document.getElementById('loading-overlay');if(el)el.style.display='none';}
function showSyncToast(msg){
  let toast=document.getElementById('sync-toast');
  if(!toast){toast=document.createElement('div');toast.id='sync-toast';toast.className='sync-toast';document.body.appendChild(toast);}
  toast.textContent=msg||'✓ 最新データに更新しました';
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{toast.classList.add('show');});});
  setTimeout(()=>{toast.classList.remove('show');},2800);
}

function updateSyncStatus(status){
  const el=document.getElementById('sync-status-text');if(!el)return;
  if(status==='synced'){el.className='sync-status synced';el.textContent='✓ 同期済み'+(lastSyncTime?' '+lastSyncTime:'');}
  else if(status==='syncing'){el.className='sync-status syncing';el.textContent='🔄 同期中...';}
  else if(status==='error'){el.className='sync-status error';el.textContent='⚠️ 同期エラー';}
  else if(status==='offline'){el.className='sync-status offline';el.textContent='📴 オフライン';}
  else{el.className='sync-status';el.textContent='';}
}

function startAutoSync(){
  function scheduleNext(){
    if(syncTimer)clearTimeout(syncTimer);
    syncTimer=setTimeout(function(){
      syncTimer=null;
      if(gdriveToken&&navigator.onLine&&!document.hidden){syncFromGoogleDrive(function(){scheduleNext();});}
      else{scheduleNext();}
    },getSyncInterval());
  }
  scheduleNext();
  window.addEventListener('online',function(){
    if(gdriveToken&&!document.hidden){syncFailCount=0;syncFromGoogleDrive(function(){});}
    updateSyncStatus('synced');
  });
  window.addEventListener('offline',function(){updateSyncStatus('offline');});
  document.addEventListener('visibilitychange',function(){
    if(!document.hidden){
      checkDateChange().then(function(){loadCurrentChannel();render();if(gdriveToken&&navigator.onLine){syncFromGoogleDrive(function(){});}});
    }
  });
}
function stopAutoSync(){if(syncTimer){clearTimeout(syncTimer);syncTimer=null;}}

function syncFromGoogleDrive(callback,isStartup){
  if(!gdriveToken||!gdriveFileId){if(callback)callback();return;}
  if(!navigator.onLine){updateSyncStatus('offline');if(callback)callback();return;}
  if(!document.hidden)updateSyncStatus('syncing');
  fetch('https://www.googleapis.com/drive/v3/files/'+gdriveFileId+'?alt=media',{headers:{'Authorization':'Bearer '+gdriveToken}})
    .then(function(r){if(r.status===401)throw new Error('401');if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(driveData){
      syncFailCount=0;
      if(!driveData.checkData){lastSyncTime=new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});updateSyncStatus('synced');if(isStartup)showSyncToast('✓ 最新データに更新しました');if(callback)callback();return;}
      const driveTime=driveData.lastSync?new Date(driveData.lastSync).getTime():0;
      const localSyncStr=localStorage.getItem('monitorLastSync');
      const localTime=localSyncStr?new Date(localSyncStr).getTime():0;
      if(driveTime>localTime){state.checkData=driveData.checkData;localStorage.setItem('monitorCheckData',JSON.stringify(state.checkData));localStorage.setItem('monitorLastSync',driveData.lastSync);checkDateChange();loadCurrentChannel();render();}
      else if(localTime>driveTime){uploadToGoogleDrive();}
      lastSyncTime=new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      updateSyncStatus('synced');if(isStartup)showSyncToast('✓ 最新データに更新しました');if(callback)callback();
    }).catch(function(e){
      console.error('同期エラー:',e);syncFailCount=Math.min(syncFailCount+1,SYNC_INTERVALS.length-1);
      if(e.message&&e.message.indexOf('401')>=0){handleTokenExpired();}else{updateSyncStatus('error');}
      if(isStartup)showSyncToast('⚠️ 同期に失敗しました（ローカルデータを使用中）');if(callback)callback();
    });
}

function handleTokenExpired(){
  gdriveToken=null;gdriveFileId=null;localStorage.removeItem('gdriveToken');localStorage.removeItem('gdriveFileId');
  stopAutoSync();updateGDriveUI();updateSyncStatus('none');
  alert('⚠️ Google Driveのログインが切れました。\n\n「☁️ Google Drive連携」ボタンを押して再接続してください。');
}

function uploadToGoogleDrive(){
  if(!gdriveToken)return;if(!navigator.onLine){updateSyncStatus('offline');return;}
  const now=new Date().toISOString();const data={checkData:state.checkData,lastSync:now,version:'1.0'};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify({name:GDRIVE_FILE_NAME,mimeType:'application/json'})],{type:'application/json'}));
  form.append('file',new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  const url=gdriveFileId?'https://www.googleapis.com/upload/drive/v3/files/'+gdriveFileId+'?uploadType=multipart':'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  fetch(url,{method:gdriveFileId?'PATCH':'POST',headers:{'Authorization':'Bearer '+gdriveToken},body:form})
    .then(r=>{if(r.status===401)throw new Error('401');return r.json();})
    .then(result=>{
      if(result.id){gdriveFileId=result.id;localStorage.setItem('gdriveFileId',gdriveFileId);localStorage.setItem('monitorLastSync',now);lastSyncTime=new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});updateSyncStatus('synced');updateGDriveUI();}
    }).catch(e=>{if(e.message&&e.message.indexOf('401')>=0)handleTokenExpired();else updateSyncStatus('error');});
}

function manualSync(){
  if(!gdriveToken){alert('Google Drive連携が必要です');return;}
  if(!navigator.onLine){alert('オフラインのため同期できません\n\nWi-Fiに接続してから再度お試しください');return;}
  const btn=document.getElementById('manual-sync-btn');
  if(btn){btn.disabled=true;btn.textContent='同期中...';}
  syncFromGoogleDrive(function(){if(btn){btn.disabled=false;btn.textContent='🔄 今すぐ同期';}showSyncToast('✓ 同期が完了しました');});
}

function getCurrentChannel(){
  const ward=wardsConfig[state.currentWardKey];
  const monitor=ward.monitors[state.currentMonitorIndex];
  const channel=monitor.channels[state.currentChannelIndex];
  return{ward,monitor,channel,channelId:`${state.currentWardKey}-${monitor.id}-${channel}`};
}

function loadCurrentChannel(){
  const{ward,channelId}=getCurrentChannel();
  const saved=state.checkData[channelId];
  if(saved){
    state.currentInput={...emptyInput(),...saved};
    if(saved.roomNumber&&saved.roomNumber.startsWith(ward.floor))
      state.roomNumberSuffix=saved.roomNumber.substring(1);
    else state.roomNumberSuffix='';
    // 保存済みデータがあれば確定済み扱い
    state.inputConfirmed=true;
  }else{
    state.currentInput=emptyInput();
    state.roomNumberSuffix='';
    state.inputConfirmed=false;
  }
}

function getMonitorProgress(wardKey,monitor){
  const total=monitor.channels.length;
  const checked=monitor.channels.filter(ch=>{const d=state.checkData[`${wardKey}-${monitor.id}-${ch}`];return d&&d.checkedToday===true;}).length;
  return{checked,total,pct:total>0?Math.round((checked/total)*100):0};
}

function isAllChecked(){
  for(const wk of wardKeys){const ward=wardsConfig[wk];for(const monitor of ward.monitors){for(const ch of monitor.channels){const d=state.checkData[`${wk}-${monitor.id}-${ch}`];if(!d||d.checkedToday!==true)return false;}}}return true;
}
function isOnlyUncheckedAreEmpty(){
  let hasUncheckedEmpty=false;
  for(const wk of wardKeys){const ward=wardsConfig[wk];for(const monitor of ward.monitors){for(const ch of monitor.channels){const d=state.checkData[`${wk}-${monitor.id}-${ch}`];if(!d||d.checkedToday!==true){if(!d||!d.isEmpty)return false;hasUncheckedEmpty=true;}}}}
  return hasUncheckedEmpty;
}
function markAllEmptyAsChecked(){
  wardKeys.forEach(wk=>{wardsConfig[wk].monitors.forEach(monitor=>{monitor.channels.forEach(ch=>{const cid=`${wk}-${monitor.id}-${ch}`;const d=state.checkData[cid];if((!d||d.checkedToday!==true)&&d&&d.isEmpty){state.checkData[cid]={...d,checkedAt:new Date().toISOString(),checkedToday:true};}});});});
  localStorage.setItem('monitorCheckData',JSON.stringify(state.checkData));
  if(gdriveToken&&navigator.onLine)uploadToGoogleDrive();
  appendToMonthlyExcel(getTodayString(),state.checkData).then(()=>{state.showSummary=true;render();});
}

function saveAndNext(){
  const{ward,channelId}=getCurrentChannel();
  const fullRoom=state.roomNumberSuffix?`${ward.floor}${state.roomNumberSuffix}`:'';
  state.checkData[channelId]={...state.currentInput,roomNumber:fullRoom,checkedAt:new Date().toISOString(),checkedToday:true,isEmpty:false};
  localStorage.setItem('monitorCheckData',JSON.stringify(state.checkData));
  if(gdriveToken&&navigator.onLine)uploadToGoogleDrive();
  if(isAllChecked()){appendToMonthlyExcel(getTodayString(),state.checkData).then(()=>{state.showSummary=true;render();});return;}
  const curWard=wardsConfig[state.currentWardKey];
  const curMonitor=curWard.monitors[state.currentMonitorIndex];
  const isLastCh=state.currentChannelIndex===curMonitor.channels.length-1;
  const hasNextMonitor=state.currentMonitorIndex<curWard.monitors.length-1||wardKeys.indexOf(state.currentWardKey)<wardKeys.length-1;
  if(isLastCh&&hasNextMonitor){state.pendingMonitorChange=true;render();return;}
  moveNext();
}
function confirmMoveNext(){state.pendingMonitorChange=false;moveNext();}
function cancelMoveNext(){state.pendingMonitorChange=false;render();}

function markEmpty(){
  const{channelId}=getCurrentChannel();
  state.checkData[channelId]={...emptyInput(),roomNumber:'',remarks:'空床',checkedAt:new Date().toISOString(),checkedToday:true,isEmpty:true};
  localStorage.setItem('monitorCheckData',JSON.stringify(state.checkData));
  if(gdriveToken&&navigator.onLine)uploadToGoogleDrive();
  if(isAllChecked()){appendToMonthlyExcel(getTodayString(),state.checkData).then(()=>{state.showSummary=true;render();});return;}
  moveNext();
}

function clearCurrent(){
  const{channelId}=getCurrentChannel();
  delete state.checkData[channelId];
  localStorage.setItem('monitorCheckData',JSON.stringify(state.checkData));
  state.currentInput=emptyInput();state.roomNumberSuffix='';state.inputConfirmed=false;render();
}

function moveNext(){
  state.inputConfirmed=false;
  const ward=wardsConfig[state.currentWardKey];
  const monitor=ward.monitors[state.currentMonitorIndex];
  if(state.currentChannelIndex<monitor.channels.length-1){state.currentChannelIndex++;}
  else if(state.currentMonitorIndex<ward.monitors.length-1){state.currentMonitorIndex++;state.currentChannelIndex=0;}
  else{const wardIdx=wardKeys.indexOf(state.currentWardKey);if(wardIdx<wardKeys.length-1){state.currentWardKey=wardKeys[wardIdx+1];state.currentMonitorIndex=0;state.currentChannelIndex=0;}}
  loadCurrentChannel();render();
}

function autoSaveCurrent(){
  const{ward,channelId}=getCurrentChannel();
  const fullRoom=state.roomNumberSuffix?`${ward.floor}${state.roomNumberSuffix}`:'';
  const hasAnyInput=fullRoom||state.currentInput.patientName||state.currentInput.spo2Alarm||state.currentInput.electrodeCheck||state.currentInput.batteryChange||state.currentInput.signalLost||state.currentInput.tempAbsent||state.currentInput.admitDischargeError||state.currentInput.spo2Only;
  if(!hasAnyInput)return;
  const existing=state.checkData[channelId];
  state.checkData[channelId]={...state.currentInput,roomNumber:fullRoom,checkedAt:new Date().toISOString(),checkedToday:existing?existing.checkedToday:false,isEmpty:false};
  localStorage.setItem('monitorCheckData',JSON.stringify(state.checkData));
}

function movePrev(){
  autoSaveCurrent();
  state.pendingMonitorChange=false;  // ← 修正: 戻る時も確認をリセット
  state.inputConfirmed=false;
  const ward=wardsConfig[state.currentWardKey];
  if(state.currentChannelIndex>0){state.currentChannelIndex--;}
  else if(state.currentMonitorIndex>0){state.currentMonitorIndex--;const monitor=ward.monitors[state.currentMonitorIndex];state.currentChannelIndex=monitor.channels.length-1;}
  else{const wardIdx=wardKeys.indexOf(state.currentWardKey);if(wardIdx>0){const prevWardKey=wardKeys[wardIdx-1];const prevWard=wardsConfig[prevWardKey];state.currentWardKey=prevWardKey;state.currentMonitorIndex=prevWard.monitors.length-1;state.currentChannelIndex=prevWard.monitors[prevWard.monitors.length-1].channels.length-1;}}
  loadCurrentChannel();render();
}

function toggleAlarm(key){
  const input=state.currentInput;
  if((key==='tempAbsent'||key==='signalLost')&&!input[key]){
    input[key]=true;input.spo2Alarm=false;input.electrodeCheck=false;input.admitDischargeError=false;input.batteryChange=false;
    if(key==='tempAbsent')input.signalLost=false;else input.tempAbsent=false;
  }else if(key==='tempAbsent'||key==='signalLost'){input[key]=false;}
  else{input[key]=!input[key];if(['spo2Alarm','electrodeCheck','admitDischargeError','batteryChange'].includes(key)){input.tempAbsent=false;input.signalLost=false;}}
  render();
}

// ★ Enter確定ハンドラ
// ============================================================
function handleNameKeydown(e){
  if(e.key==='Enter'){
    e.preventDefault();
    state.currentInput.patientName=e.target.value;
    state.inputConfirmed=true;
    e.target.blur();
    render();
  }
}
function handleRoomKeydown(e){
  if(e.key==='Enter'){
    e.preventDefault();
    state.roomNumberSuffix=e.target.value.replace(/[^0-9]/g,'');
    state.inputConfirmed=true;
    e.target.blur();
    render();
  }
}

function updateRoom(val){state.roomNumberSuffix=val.replace(/[^0-9]/g,'');}
function updateName(val){state.currentInput.patientName=val;}

function getChannelBgClass(data){
  if(!data)return 'channel-bg-unchecked';if(data.checkedToday!==true)return 'channel-bg-unchecked';
  if(data.isEmpty)return 'channel-bg-empty';
  const hasAlarm=data.spo2Alarm||data.electrodeCheck||data.batteryChange||data.signalLost||data.admitDischargeError;
  if(hasAlarm)return 'channel-bg-alarm';if(data.tempAbsent)return 'channel-bg-status';
  if(data.spo2Only)return 'channel-bg-spo2only';return 'channel-bg-ok';
}

function getTotalStats(){
  let total=0,checked=0,alarms=0;
  Object.values(wardsConfig).forEach(ward=>{ward.monitors.forEach(monitor=>{total+=monitor.channels.length;monitor.channels.forEach(channel=>{const cid=`${Object.keys(wardsConfig).find(k=>wardsConfig[k]===ward)}-${monitor.id}-${channel}`;const data=state.checkData[cid];if(data&&data.checkedToday===true){checked++;if(data.spo2Alarm||data.electrodeCheck||data.batteryChange||data.signalLost||data.admitDischargeError)alarms++;}});});});
  return{total,checked,alarms,complete:checked===total};
}

function render(){
  const{ward,monitor,channel}=getCurrentChannel();
  const stats=getTotalStats();
  const{checked:monChecked,total:monTotal,pct}=getMonitorProgress(state.currentWardKey,monitor);
  const rowsPerCol=Math.ceil(monitor.channels.length/2);
  const leftChannels=[],rightChannels=[];
  monitor.channels.forEach((ch,idx)=>{if(idx<rowsPerCol)leftChannels.push({ch,idx});else rightChannels.push({ch,idx});});
  const lastWardKey=wardKeys[wardKeys.length-1];
  const lastWard=wardsConfig[lastWardKey];
  const lastMonitorIdx=lastWard.monitors.length-1;
  const lastChannelIdx=lastWard.monitors[lastMonitorIdx].channels.length-1;
  const isLast=state.currentWardKey===lastWardKey&&state.currentMonitorIndex===lastMonitorIdx&&state.currentChannelIndex===lastChannelIdx;

  // ★ 保存ボタン有効判定
  // アラーム系はEnter不要で即有効。テキスト入力はEnter確定が必要。
  const hasAlarmInput=state.currentInput.spo2Alarm||state.currentInput.electrodeCheck||
    state.currentInput.batteryChange||state.currentInput.signalLost||
    state.currentInput.tempAbsent||state.currentInput.admitDischargeError||
    state.currentInput.spo2Only;
  const hasTextInput=state.roomNumberSuffix||state.currentInput.patientName;
  const hasInput=hasAlarmInput||(hasTextInput&&state.inputConfirmed);

  // Enter確定ヒント表示
  const needsConfirm=hasTextInput&&!state.inputConfirmed&&!hasAlarmInput;
  const hintHtml=needsConfirm
    ? `<div class="enter-hint">⌨️ <span class="enter-hint-key">Enter</span> を押して確定してください</div>`
    : state.inputConfirmed
      ? `<div class="enter-hint confirmed">✓ 確定済み</div>`
      : '';

  document.getElementById('app').innerHTML=`
    <div class="card">
      <div class="header">
        <div>
          <h1 class="title">病棟モニタラウンド <span style="font-size:11px;font-weight:500;color:#9ca3af;letter-spacing:0.02em;">v1.0</span></h1>
          ${lastSyncTime?`<div style="font-size:11px;color:#9ca3af;margin-top:2px;">最終同期: ${lastSyncTime}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="stats">
            <div class="stats-num">${stats.checked}/${stats.total}</div>
            ${stats.alarms>0?`<div class="stats-alarm">アラーム ${stats.alarms}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            <div style="display:flex;gap:8px;">
              <button class="btn" id="gdrive-btn" onclick="toggleGoogleDrive()" style="background:#4285f4;color:#fff">☁️ Google Drive連携</button>
              <button class="btn" id="manual-sync-btn" onclick="manualSync()" style="background:#0ea5e9;color:#fff;display:none">🔄 今すぐ同期</button>
              ${stats.complete?'<button class="btn btn-success" onclick="showSummaryManual()">📋 サマリー表示</button>':isOnlyUncheckedAreEmpty()?'<button class="btn btn-success" onclick="markAllEmptyAsChecked()">🛏️ 空床を一括入力済みにする</button>':''}
            </div>
            <div class="sync-bar"><span id="sync-status-text" class="sync-status"></span></div>
          </div>
        </div>
      </div>
      <div class="ward-tabs">
        ${wardKeys.map(wk=>{
          const w=wardsConfig[wk];let wChecked=0,wTotal=0;
          w.monitors.forEach(m=>{wTotal+=m.channels.length;m.channels.forEach(ch=>{const d=state.checkData[`${wk}-${m.id}-${ch}`];if(d&&d.checkedToday===true)wChecked++;});});
          const active=state.currentWardKey===wk;
          return`<button class="ward-tab ward-tab-${active?'active':'inactive'} ${w.color}" onclick="selectWard('${wk}')">
            <div class="ward-name">${w.name}</div>
            <div class="ward-count">${wChecked}/${wTotal}</div>
          </button>`;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="monitor-select">
        <label class="monitor-label">セントラルモニタ選択</label>
        <div class="monitor-btns">
          ${ward.monitors.map((m,idx)=>`
            <button class="monitor-btn ${state.currentMonitorIndex===idx?ward.color:'btn-gray'}" onclick="selectMonitor(${idx})">${m.name}</button>
          `).join('')}
        </div>
      </div>
      <div class="channel-display">
        <div class="channel-number ${ward.color}-text">${channel}</div>
        <div class="nav-btns">
          ${state.pendingMonitorChange?`
            <span style="font-size:14px;font-weight:700;color:#374151;display:flex;align-items:center;white-space:nowrap;">次のモニタに進みますか？</span>
            <button class="btn btn-success" onclick="confirmMoveNext()">はい</button>
            <button class="btn btn-gray" onclick="cancelMoveNext()">いいえ</button>
          `:`
            <button class="btn btn-gray" onclick="movePrev()" ${state.currentWardKey==='W7'&&state.currentMonitorIndex===0&&state.currentChannelIndex===0?'disabled':''}>← 前へ</button>
            <button class="btn btn-gray" onclick="markEmpty()">空床</button>
            <button class="btn-save-next" onclick="saveAndNext()" ${hasInput?'':'disabled'}>
              ${isLast?'保存してサマリー →':'保存して次へ →'}
            </button>
          `}
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill ${ward.color}" style="width:${pct}%"></div>
      </div>
      <div class="progress-label">${monChecked} / ${monTotal} チャンネル完了（${pct}%）</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">部屋番号</label>
          <div class="room-input-group">
            <div class="room-prefix">${ward.floor}</div>
            <input type="tel" inputmode="numeric" pattern="[0-9]*" class="input room-suffix"
                   value="${state.roomNumberSuffix}"
                   oninput="updateRoom(this.value)"
                   onkeydown="handleRoomKeydown(event)"
                   placeholder="01" maxlength="2">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">患者氏名</label>
          <div class="name-input-group">
            <input type="text" class="input" style="flex:1"
                   value="${state.currentInput.patientName}"
                   oninput="updateName(this.value)"
                   onkeydown="handleNameKeydown(event)"
                   placeholder="山田 太郎" lang="ja" autocomplete="name">
            <button class="btn-icon btn-blue" onclick="showHandwritingModal()" title="手書き検索" style="font-size:18px;">✏️</button>
            <button class="btn-icon btn-yellow" onclick="clearCurrent()" title="クリア">✕</button>
          </div>
          ${hintHtml}
        </div>
      </div>
      <div>
        <label class="form-label">アラーム・状態</label>
        <div class="alarm-btns">
          ${[
            {key:'spo2Alarm',label:'SpO2',type:'alarm'},
            {key:'electrodeCheck',label:'電極確認',type:'alarm'},
            {key:'batteryChange',label:'電池交換',type:'alarm'},
            {key:'signalLost',label:'電波切れ',type:'alarm'},
            {key:'admitDischargeError',label:'入退床忘れ',type:'alarm'},
            {key:'tempAbsent',label:'一時退室中',type:'status'},
            {key:'spo2Only',label:'SpO2のみ',type:'status'}
          ].map(item=>`
            <button class="alarm-btn ${state.currentInput[item.key]?(item.type==='alarm'?'alarm-btn-on':'status-btn-on'):(item.type==='alarm'?'alarm-btn-off':'status-btn-off')}"
                    onclick="toggleAlarm('${item.key}')">${item.label}</button>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="monitor-panel">
      <div class="panel-header">
        <div class="panel-title">${ward.name} - Monitor ${monitor.name}</div>
        <div class="panel-status"><div class="status-dot"></div><span class="status-text">ACTIVE</span></div>
      </div>
      <div class="channel-grid">
        <div class="channel-list">${leftChannels.map(({ch,idx})=>renderChannelCard(ch,idx)).join('')}</div>
        <div class="channel-list">${rightChannels.map(({ch,idx})=>renderChannelCard(ch,idx)).join('')}</div>
      </div>
    </div>
  `;

  if(state.showSummary)renderSummary();
  updateGDriveUI();
  if(!navigator.onLine)updateSyncStatus('offline');
}

function renderChannelCard(ch,idx){
  const cid=`${state.currentWardKey}-${wardsConfig[state.currentWardKey].monitors[state.currentMonitorIndex].id}-${ch}`;
  const data=state.checkData[cid];
  const isCurrent=state.currentChannelIndex===idx;
  const bgClass=getChannelBgClass(data);
  return`<button class="channel-card ${bgClass}${isCurrent?' channel-card-active':''}" onclick="jumpToChannel(${idx})">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;min-height:24px;">
      <div class="channel-id">ch${ch}${PERMANENT_CHANNELS.has(ch)?'<span title="ベッドサイドモニタ常設" style="font-size:10px;margin-left:3px;opacity:0.85;">🖥️</span>':''}</div>
      ${data?.roomNumber?`<div class="channel-room">${data.roomNumber}</div>`:''}
      ${data?.patientName?`<div class="channel-name">${data.patientName}</div>`:''}
    </div>
    ${data?.isEmpty?'<div class="channel-empty">空床</div>':''}
    <div class="channel-tags">
      ${data?.spo2Alarm?'<span class="tag tag-alarm">SpO2</span>':''}
      ${data?.electrodeCheck?'<span class="tag tag-alarm">電極確認</span>':''}
      ${data?.batteryChange?'<span class="tag tag-alarm">電池交換</span>':''}
      ${data?.signalLost?'<span class="tag tag-alarm">電波切れ</span>':''}
      ${data?.tempAbsent?'<span class="tag tag-status">一時退室中</span>':''}
      ${data?.admitDischargeError?'<span class="tag tag-status">入退床忘れ</span>':''}
      ${data?.spo2Only?'<span class="tag tag-status">SpO2のみ</span>':''}
    </div>
  </button>`;
}

function renderSummary(){
  const stats=getTotalStats();
  const modal=document.createElement('div');modal.className='modal';
  modal.innerHTML=`
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">ラウンド結果サマリー</h3>
        <button class="btn-icon btn-gray" onclick="hideSummary()">✕</button>
      </div>
      <div class="summary-box">
        <div class="summary-title"><span style="font-size:24px;">✓</span>全チャンネルのチェックが完了しました！</div>
        <div class="summary-stats">チェック数: ${stats.checked}/${stats.total} | アラーム: ${stats.alarms}件</div>
      </div>
      ${Object.entries(wardsConfig).map(([wk,w])=>{
        let alarms=0,statuses=0,empties=0;
        w.monitors.forEach(m=>{m.channels.forEach(ch=>{const data=state.checkData[`${wk}-${m.id}-${ch}`];if(data&&data.checkedToday===true){if(data.isEmpty)empties++;else if(data.spo2Alarm||data.electrodeCheck||data.batteryChange||data.signalLost||data.admitDischargeError)alarms++;else if(data.tempAbsent||data.spo2Only)statuses++;}});});
        return`<div class="ward-summary ${w.color}-light">
          <div class="ward-summary-title ${w.color}-text">${w.name}</div>
          <div class="ward-summary-grid">
            <div>アラーム: <span style="font-weight:700;color:#dc2626;">${alarms}</span></div>
            <div>状態あり: <span style="font-weight:700;color:#ea580c;">${statuses}</span></div>
            <div>空床: <span style="font-weight:700;color:#6b7280;">${empties}</span></div>
          </div>
        </div>`;
      }).join('')}
      <div style="display:flex;gap:12px;margin-top:16px;">
        <button class="btn btn-gray" onclick="hideSummary()">閉じる</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

// ★ 修正: 病棟・モニタ・チャンネル切替時に pendingMonitorChange をリセット
function selectWard(wk){
  autoSaveCurrent();
  state.pendingMonitorChange=false;
  state.inputConfirmed=false;
  state.currentWardKey=wk;state.currentMonitorIndex=0;state.currentChannelIndex=0;
  loadCurrentChannel();render();
}
function selectMonitor(idx){
  autoSaveCurrent();
  state.pendingMonitorChange=false;
  state.inputConfirmed=false;
  state.currentMonitorIndex=idx;state.currentChannelIndex=0;
  loadCurrentChannel();render();
}
function jumpToChannel(idx){
  autoSaveCurrent();
  state.pendingMonitorChange=false;
  state.inputConfirmed=false;
  state.currentChannelIndex=idx;
  loadCurrentChannel();render();
}

function showSummaryManual(){state.showSummary=true;render();}
function hideSummary(){state.showSummary=false;const modal=document.querySelector('.modal');if(modal)modal.remove();}

function getTodayString(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getMonthString(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

const EXCEL_HEADERS=['日付','病棟','セントラル','チャンネル','部屋番号','患者氏名','SpO2アラーム','電極確認','電池交換','電波切れ','一時退室','入退床忘れ','SpO2のみ','空床','備考'];
const EXCEL_COL_WIDTHS=[{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:14},{wch:12},{wch:10},{wch:10},{wch:10},{wch:12},{wch:12},{wch:10},{wch:6},{wch:16}];
function buildRowsForDate(dateStr,checkData){
  const rows=[];
  wardKeys.forEach(wk=>{const ward=wardsConfig[wk];ward.monitors.forEach(monitor=>{monitor.channels.forEach(ch=>{const cid=`${wk}-${monitor.id}-${ch}`;const d=checkData[cid];if(!d)return;rows.push(EXCEL_HEADERS.map(h=>({'日付':dateStr,'病棟':ward.name,'セントラル':monitor.name,'チャンネル':ch,'部屋番号':d.roomNumber||'','患者氏名':d.patientName||'','SpO2アラーム':d.spo2Alarm?'○':'','電極確認':d.electrodeCheck?'○':'','電池交換':d.batteryChange?'○':'','電波切れ':d.signalLost?'○':'','一時退室':d.tempAbsent?'○':'','入退床忘れ':d.admitDischargeError?'○':'','SpO2のみ':d.spo2Only?'○':'','空床':d.isEmpty?'○':'','備考':d.remarks||''})[h]||''));});});});
  return rows;
}
async function appendToMonthlyExcel(dateStr,checkData){
  if(!gdriveToken)return;if(!navigator.onLine){console.warn('オフラインのためExcel保存スキップ');return;}
  const monthStr=getMonthString();const fileName=`ラウンド記録_${monthStr}.xlsx`;
  const newRows=buildRowsForDate(dateStr,checkData);if(newRows.length===0)return;
  try{
    const searchRes=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${fileName}'&fields=files(id)`,{headers:{'Authorization':'Bearer '+gdriveToken}});
    if(searchRes.status===401){handleTokenExpired();return;}
    const searchData=await searchRes.json();
    const existingId=searchData.files&&searchData.files.length>0?searchData.files[0].id:null;
    let wb;
    if(existingId){const dlRes=await fetch(`https://www.googleapis.com/drive/v3/files/${existingId}?alt=media`,{headers:{'Authorization':'Bearer '+gdriveToken}});const arrayBuffer=await dlRes.arrayBuffer();wb=XLSX.read(new Uint8Array(arrayBuffer),{type:'array'});}
    else{wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet([EXCEL_HEADERS]);ws['!cols']=EXCEL_COL_WIDTHS;XLSX.utils.book_append_sheet(wb,ws,'ラウンド記録');}
    const sheetName=wb.SheetNames[0];const ws=wb.Sheets[sheetName];
    const existingData=XLSX.utils.sheet_to_json(ws,{header:1});
    const filtered=existingData.filter((row,idx)=>idx===0||row[0]!==dateStr);
    newRows.forEach(row=>filtered.push(row));
    const newWs=XLSX.utils.aoa_to_sheet(filtered);newWs['!cols']=EXCEL_COL_WIDTHS;wb.Sheets[sheetName]=newWs;
    const wbArray=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([wbArray],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify({name:fileName,mimeType:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})],{type:'application/json'}));
    form.append('file',blob);
    const url=existingId?`https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart`:'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    await fetch(url,{method:existingId?'PATCH':'POST',headers:{'Authorization':'Bearer '+gdriveToken},body:form});
  }catch(err){console.error('Excel保存エラー:',err);}
}

function toggleGoogleDrive(){if(gdriveToken){if(confirm('Google Drive連携を解除しますか？'))disconnectGoogleDrive();}else connectGoogleDrive();}
function connectGoogleDrive(){
  const CLIENT_ID='749739667971-t8rcijk84v2lj6aghuu3f04disomur39.apps.googleusercontent.com';
  const REDIRECT_URI=window.location.origin+window.location.pathname;
  const SCOPE='https://www.googleapis.com/auth/drive.file';
  window.location.href='https://accounts.google.com/o/oauth2/v2/auth?client_id='+encodeURIComponent(CLIENT_ID)+'&redirect_uri='+encodeURIComponent(REDIRECT_URI)+'&response_type=token&scope='+encodeURIComponent(SCOPE);
}
function disconnectGoogleDrive(){
  gdriveToken=null;gdriveFileId=null;localStorage.removeItem('gdriveToken');localStorage.removeItem('gdriveFileId');
  stopAutoSync();updateGDriveUI();updateSyncStatus('none');alert('Google Drive連携を解除しました');
}
function handleGoogleDriveCallback(){
  const hash=window.location.hash;
  if(hash.includes('access_token=')){
    const params=new URLSearchParams(hash.substring(1));const token=params.get('access_token');
    if(token){gdriveToken=token;localStorage.setItem('gdriveToken',token);window.history.replaceState({},document.title,window.location.pathname);initGoogleDriveSync(true);}
  }
}
async function initGoogleDriveSync(isStartup){
  updateGDriveUI();
  try{
    const response=await fetch('https://www.googleapis.com/drive/v3/files?q=name="'+GDRIVE_FILE_NAME+'"&fields=files(id,name)',{headers:{'Authorization':'Bearer '+gdriveToken}});
    if(response.status===401){handleTokenExpired();return;}
    const data=await response.json();
    if(data.files&&data.files.length>0){gdriveFileId=data.files[0].id;localStorage.setItem('gdriveFileId',gdriveFileId);syncFromGoogleDrive(function(){hideLoadingOverlay();},isStartup);}
    else{uploadToGoogleDrive();hideLoadingOverlay();if(isStartup)showSyncToast('✓ 新規ファイルを作成しました');}
    startAutoSync();
  }catch(err){
    console.error('Google Drive初期化エラー:',err);hideLoadingOverlay();
    if(!navigator.onLine){updateSyncStatus('offline');startAutoSync();}
    else{alert('Google Drive連携に失敗しました。再度お試しください。');}
  }
}
function updateGDriveUI(){
  const btn=document.getElementById('gdrive-btn');const manualBtn=document.getElementById('manual-sync-btn');const banner=document.getElementById('token-banner');
  if(!btn)return;
  if(gdriveToken){btn.textContent='☁️ 連携中';btn.style.background='#34a853';if(manualBtn)manualBtn.style.display='inline-block';if(banner)banner.classList.remove('show');}
  else{btn.textContent='☁️ Google Drive連携';btn.style.background='#4285f4';if(manualBtn)manualBtn.style.display='none';}
}

async function saveHistoricalData(){const lastDate=localStorage.getItem('monitorLastDate');if(lastDate)await appendToMonthlyExcel(lastDate,state.checkData);}
function resetAlarmsForNewDay(){
  Object.keys(state.checkData).forEach(channelId=>{
    const data=state.checkData[channelId];
    if(data.isEmpty){data.checkedToday=false;return;}
    data.spo2Alarm=false;data.electrodeCheck=false;data.batteryChange=false;
    data.signalLost=false;data.admitDischargeError=false;data.tempAbsent=false;data.checkedToday=false;
  });
  localStorage.setItem('monitorCheckData',JSON.stringify(state.checkData));
}
async function checkDateChange(){
  const today=getTodayString();const lastDate=localStorage.getItem('monitorLastDate');
  if(lastDate&&lastDate!==today){await saveHistoricalData();resetAlarmsForNewDay();}
  localStorage.setItem('monitorLastDate',today);
}

// ============================================================
// 手書き文字認識
// ============================================================
let hwStrokes=[],hwCurrentStroke=null,hwDrawing=false,hwCanvas=null,hwCtx=null;
function showHandwritingModal(){
  const modal=document.createElement('div');modal.className='hw-modal';modal.id='hw-modal';
  modal.innerHTML=`<div class="hw-modal-content"><div class="hw-modal-title"><span>✏️ 手書き検索</span></div><canvas id="hw-canvas" class="hw-canvas" height="220"></canvas><div class="hw-actions"><button class="hw-btn hw-btn-clear" onclick="hwClearCanvas()">クリア</button><button class="hw-btn hw-btn-search" onclick="hwRecognize()">認識する</button></div><div class="hw-status" id="hw-status">文字を書いて「認識する」を押してください</div><div class="hw-candidates" id="hw-candidates"></div><div class="hw-hint">候補をタップすると氏名欄に追加して自動で閉じます</div></div>`;
  document.body.appendChild(modal);
  const hwCloseBtn=document.createElement('button');hwCloseBtn.className='hw-close-btn';hwCloseBtn.innerHTML='✕';hwCloseBtn.onclick=hideHandwritingModal;document.body.appendChild(hwCloseBtn);
  hwStrokes=[];hwCurrentStroke=null;hwDrawing=false;hwCanvas=document.getElementById('hw-canvas');
  const dpr=window.devicePixelRatio||1;const rect=hwCanvas.parentElement.getBoundingClientRect();const w=Math.min(360,rect.width-40);
  hwCanvas.width=w*dpr;hwCanvas.height=220*dpr;hwCanvas.style.width=w+'px';hwCanvas.style.height='220px';
  hwCtx=hwCanvas.getContext('2d');hwCtx.scale(dpr,dpr);hwCtx.strokeStyle='#1e1b4b';hwCtx.lineWidth=4;hwCtx.lineCap='round';hwCtx.lineJoin='round';
  hwCanvas.addEventListener('touchstart',hwTouchStart,{passive:false});hwCanvas.addEventListener('touchmove',hwTouchMove,{passive:false});hwCanvas.addEventListener('touchend',hwTouchEnd,{passive:false});
  hwCanvas.addEventListener('mousedown',hwMouseDown);hwCanvas.addEventListener('mousemove',hwMouseMove);hwCanvas.addEventListener('mouseup',hwMouseUp);
}
function hwGetPos(e,canvas){const rect=canvas.getBoundingClientRect();const touch=e.touches?e.touches[0]:e;return{x:touch.clientX-rect.left,y:touch.clientY-rect.top,t:Date.now()};}
function hwTouchStart(e){e.preventDefault();const pos=hwGetPos(e,hwCanvas);hwDrawing=true;hwCurrentStroke={xs:[pos.x],ys:[pos.y],ts:[0],startTime:pos.t};hwCtx.beginPath();hwCtx.moveTo(pos.x,pos.y);}
function hwTouchMove(e){e.preventDefault();if(!hwDrawing)return;const pos=hwGetPos(e,hwCanvas);hwCurrentStroke.xs.push(pos.x);hwCurrentStroke.ys.push(pos.y);hwCurrentStroke.ts.push(pos.t-hwCurrentStroke.startTime);hwCtx.lineTo(pos.x,pos.y);hwCtx.stroke();hwCtx.beginPath();hwCtx.moveTo(pos.x,pos.y);}
function hwTouchEnd(e){e.preventDefault();if(!hwDrawing)return;hwDrawing=false;if(hwCurrentStroke&&hwCurrentStroke.xs.length>0)hwStrokes.push(hwCurrentStroke);hwCurrentStroke=null;}
function hwMouseDown(e){const pos=hwGetPos(e,hwCanvas);hwDrawing=true;hwCurrentStroke={xs:[pos.x],ys:[pos.y],ts:[0],startTime:Date.now()};hwCtx.beginPath();hwCtx.moveTo(pos.x,pos.y);}
function hwMouseMove(e){if(!hwDrawing)return;const pos=hwGetPos(e,hwCanvas);hwCurrentStroke.xs.push(pos.x);hwCurrentStroke.ys.push(pos.y);hwCurrentStroke.ts.push(Date.now()-hwCurrentStroke.startTime);hwCtx.lineTo(pos.x,pos.y);hwCtx.stroke();hwCtx.beginPath();hwCtx.moveTo(pos.x,pos.y);}
function hwMouseUp(e){if(!hwDrawing)return;hwDrawing=false;if(hwCurrentStroke&&hwCurrentStroke.xs.length>0)hwStrokes.push(hwCurrentStroke);hwCurrentStroke=null;}
function hwClearCanvas(){const dpr=window.devicePixelRatio||1;hwCtx.clearRect(0,0,hwCanvas.width/dpr,hwCanvas.height/dpr);hwStrokes=[];const cEl=document.getElementById('hw-candidates');const sEl=document.getElementById('hw-status');if(cEl)cEl.innerHTML='';if(sEl)sEl.textContent='文字を書いて「認識する」を押してください';}
async function hwRecognize(){
  if(hwStrokes.length===0){document.getElementById('hw-status').textContent='文字を書いてください';return;}
  const statusEl=document.getElementById('hw-status');statusEl.textContent='認識中...';
  const ink=hwStrokes.map(s=>[s.xs,s.ys,s.ts]);
  const body=JSON.stringify({requests:[{writing_guide:{writing_area_width:360,writing_area_height:220},ink,language:'ja'}]});
  try{
    const res=await fetch('https://inputtools.google.com/request?itc=ja-t-i0-handwrit&num=10',{method:'POST',headers:{'Content-Type':'application/json'},body});
    const data=await res.json();
    if(data&&data[0]==='SUCCESS'&&data[1]&&data[1][0]&&data[1][0][1]){
      const candidates=data[1][0][1];statusEl.textContent='候補をタップして氏名欄に追加：';
      document.getElementById('hw-candidates').innerHTML=candidates.map(c=>`<button class="hw-candidate" onclick="hwSelectCandidate(this,'${c}')">${c}</button>`).join('');
    }else{statusEl.textContent='認識できませんでした。もう一度書いてください。';}
  }catch(err){statusEl.textContent='エラー：オンライン環境を確認してください。';}
}
function hwSelectCandidate(btn,char){
  state.currentInput.patientName+=char;
  state.inputConfirmed=true;  // 手書き選択も確定済み扱い
  const nameInput=document.querySelector("input[placeholder='山田 太郎']");
  if(nameInput)nameInput.value=state.currentInput.patientName;
  document.querySelectorAll('.hw-candidate').forEach(b=>b.style.background='');
  btn.style.background='#6366f1';btn.style.color='#fff';
  setTimeout(()=>{hideHandwritingModal();render();},400);
}
function hideHandwritingModal(){const modal=document.getElementById('hw-modal');if(modal)modal.remove();const btn=document.querySelector('.hw-close-btn');if(btn)btn.remove();}

window.addEventListener('load',async()=>{
  const saved=localStorage.getItem('monitorCheckData');
  if(saved){try{state.checkData=JSON.parse(saved);}catch(e){}}
  await checkDateChange();
  loadCurrentChannel();

  const savedToken=localStorage.getItem('gdriveToken');
  const savedFileId=localStorage.getItem('gdriveFileId');

  if(savedToken&&navigator.onLine){
    showLoadingOverlay('データを同期中...','最新のデータに更新しています');
    render();
    gdriveToken=savedToken;gdriveFileId=savedFileId;
    await initGoogleDriveSync(true);
  }else{
    render();
    if(savedToken&&!navigator.onLine){
      gdriveToken=savedToken;gdriveFileId=savedFileId;
      updateSyncStatus('offline');startAutoSync();
      showSyncToast('📴 オフラインのためローカルデータを使用中');
    }
  }

  handleGoogleDriveCallback();
  if(!navigator.onLine)updateSyncStatus('offline');
});
