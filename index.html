<meta charset="UTF-8">

<title>モニタ貸出管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#fef3c7 0%,#fde68a 50%,#fcd34d 100%);min-height:100vh;padding:8px;font-size:14px;}
.container{max-width:1200px;margin:0 auto;}
.card{background:#fff;border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,0.1);padding:16px;margin-bottom:12px;}
.title{font-size:22px;font-weight:900;color:#111827;}
.btn{padding:10px 18px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;transition:all 0.18s;box-shadow:0 2px 6px rgba(0,0,0,0.1);font-family:'Noto Sans JP',sans-serif;}
.btn-primary{background:#f59e0b;color:#fff;}
.btn-primary:hover{background:#d97706;transform:translateY(-1px);}
.btn-primary:disabled{background:#d1d5db;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-success{background:#10b981;color:#fff;}
.btn-success:hover{background:#059669;transform:translateY(-1px);}
.btn-danger{background:#ef4444;color:#fff;}
.btn-danger:hover{background:#dc2626;transform:translateY(-1px);}
.btn-gray{background:#e5e7eb;color:#374151;}
.btn-gray:hover{background:#d1d5db;}
.btn-emergency{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;font-size:15px;padding:14px 24px;border-radius:12px;box-shadow:0 4px 14px rgba(220,38,38,0.45);letter-spacing:0.05em;animation:emergencyPulse 2.5s ease-in-out infinite;}
.btn-emergency:hover{background:linear-gradient(135deg,#b91c1c,#991b1b);transform:translateY(-2px);}
@keyframes emergencyPulse{0%,100%{box-shadow:0 4px 14px rgba(220,38,38,0.45);}50%{box-shadow:0 4px 22px rgba(220,38,38,0.7);}}
.tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:2px solid #e5e7eb;padding-bottom:8px;}
.tab{padding:9px 16px;border:none;background:none;cursor:pointer;font-weight:700;color:#6b7280;border-bottom:3px solid transparent;transition:all 0.18s;font-family:'Noto Sans JP',sans-serif;font-size:13px;}
.tab-active{color:#f59e0b;border-bottom-color:#f59e0b;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:700;color:#374151;margin-bottom:5px;display:block;}
.form-input,.form-select{width:100%;padding:10px 13px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;font-family:'Noto Sans JP',sans-serif;transition:border-color 0.15s;}
.form-input:focus,.form-select:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,0.12);}
.list-item{background:#f9fafb;padding:10px 14px;border-radius:8px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.list-item-name{font-weight:600;color:#111827;}
.rental-card{background:#fff;border:2px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.18s;}
.rental-card:hover{box-shadow:0 4px 14px rgba(0,0,0,0.1);transform:translateY(-2px);border-color:#f59e0b;}
.rental-card-overdue{border-color:#f97316 !important;background:#fff7ed;}
.rental-card-overdue:hover{border-color:#ea580c !important;}
.rental-status{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;}
.status-pending{background:#fef3c7;color:#92400e;}
.status-confirmed{background:#d1fae5;color:#065f46;}
.overdue-badge{display:inline-block;background:#fed7aa;color:#9a3412;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:6px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;}
.modal-content{background:#fff;border-radius:16px;padding:24px;max-width:600px;width:100%;max-height:92vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:19px;font-weight:700;}
.step-indicator{display:flex;gap:8px;margin-bottom:20px;}
.step{flex:1;text-align:center;padding:10px 4px;border-radius:8px;background:#f3f4f6;font-weight:700;color:#9ca3af;font-size:12px;}
.step-active{background:#fef3c7;color:#92400e;}
.step-complete{background:#d1fae5;color:#065f46;}
.info-box{background:#fffbeb;border:2px solid #fcd34d;border-radius:8px;padding:12px;margin-bottom:14px;}
.emergency-popup{position:fixed;top:0;left:0;right:0;z-index:1000;padding:12px 16px;background:linear-gradient(135deg,#7f1d1d,#991b1b);color:#fff;box-shadow:0 4px 20px rgba(127,29,29,0.5);animation:slideDown 0.35s ease;}
@keyframes slideDown{from{transform:translateY(-100%);}to{transform:translateY(0);}}
.emergency-popup-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.emergency-popup-text{flex:1;min-width:200px;}
.emergency-popup-title{font-size:15px;font-weight:900;margin-bottom:3px;}
.emergency-popup-sub{font-size:12px;opacity:0.85;line-height:1.6;}
.weekly-check-banner{background:#dc2626;color:#fff;padding:14px 16px;border-radius:12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:15px;box-shadow:0 4px 12px rgba(220,38,38,0.3);}
.history-table{width:100%;border-collapse:collapse;margin-top:10px;}
.history-table th{background:#f9fafb;padding:9px 10px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;border-bottom:2px solid #e5e7eb;}
.history-table td{padding:9px 10px;border-bottom:1px solid #f3f4f6;font-size:12px;}
.inline-form-card{background:linear-gradient(135deg,#fff9e6,#fff);border:2px solid #fcd34d;border-radius:14px;padding:18px;margin-bottom:12px;}
.inline-form-title{font-size:16px;font-weight:900;color:#92400e;margin-bottom:14px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.grid-2{grid-template-columns:1fr;}}
.section-label{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.tx-badge{display:inline-block;background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.drop-zone{border:3px dashed #d1d5db;border-radius:12px;padding:30px;text-align:center;color:#6b7280;cursor:pointer;transition:all 0.18s;}
.drop-zone:hover,.drop-zone.dragover{border-color:#f59e0b;background:#fffbeb;color:#f59e0b;}
</style>
</head>

let state={
  currentTab:'rental',
  deviceList:[],staffList:[],
  rentalTransmitters:[],wardTransmitters:{},
  shortcutPath:'',shortcutName1:'アプリA',shortcutPath2:'',shortcutName2:'アプリB',rentals:{},rentalHistory:[],
  showModal:false,modalType:'',rentalStep:1,
  currentRental:{wardKey:'',monitorId:'',channel:'',deviceId:'',staffName:'',transmitterId:'',rentalTxId:'',status:'pending'},
  emergencyPopupDismissed:false,
  settingsMasterTab:'device',wardTxFilter:'W7',
  listWardFilter:'W7'
};

function loadData(){
  const m={rental_devices:'deviceList',rental_staff:'staffList',rental_active:'rentals',rental_history:'rentalHistory',rental_tx_master:'rentalTransmitters',ward_tx_master:'wardTransmitters'};
  Object.entries(m).forEach(([k,p])=>{const v=localStorage.getItem(k);if(v)state[p]=JSON.parse(v);});
  state.shortcutPath=localStorage.getItem('rental_shortcut')||'';
  state.shortcutName1=localStorage.getItem('rental_shortcut_name1')||'アプリA';
  state.shortcutPath2=localStorage.getItem('rental_shortcut2')||'';
  state.shortcutName2=localStorage.getItem('rental_shortcut_name2')||'アプリB';
  // 未登録キーをデフォルト値で補完（手動編集済みのキーは上書きしない）
  let updated=false;
  Object.entries(DEFAULT_WARD_TX).forEach(([k,v])=>{if(!state.wardTransmitters[k]){state.wardTransmitters[k]=v;updated=true;}});
  if(updated)localStorage.setItem('ward_tx_master',JSON.stringify(state.wardTransmitters));
}
function saveData(){
  localStorage.setItem('rental_devices',JSON.stringify(state.deviceList));
  localStorage.setItem('rental_staff',JSON.stringify(state.staffList));
  localStorage.setItem('rental_shortcut',state.shortcutPath);
  localStorage.setItem('rental_shortcut_name1',state.shortcutName1);
  localStorage.setItem('rental_shortcut2',state.shortcutPath2);
  localStorage.setItem('rental_shortcut_name2',state.shortcutName2);
  localStorage.setItem('rental_active',JSON.stringify(state.rentals));
  localStorage.setItem('rental_history',JSON.stringify(state.rentalHistory));
  localStorage.setItem('rental_tx_master',JSON.stringify(state.rentalTransmitters));
  localStorage.setItem('ward_tx_master',JSON.stringify(state.wardTransmitters));
}

function checkWeeklyReview(){
  return new Date().getDay()===6&&localStorage.getItem('rental_last_weekly_check')!==new Date().toISOString().split('T')[0];
}
function markWeeklyCheckDone(){localStorage.setItem('rental_last_weekly_check',new Date().toISOString().split('T')[0]);}

function getEmergencyLog(){return JSON.parse(localStorage.getItem('emergency_log')||'[]');}
function recordEmergencyAccess(staff){
  const log=getEmergencyLog();
  log.unshift({ts:new Date().toISOString(),staff});
  localStorage.setItem('emergency_log',JSON.stringify(log.slice(0,20)));
}
function openEmergencyModal(){
  if(!state.shortcutPath&&!state.shortcutPath2){alert('チャンネル変更アプリが登録されていません\n設定タブから登録してください');return;}
  state.modalType='emergency';state.showModal=true;render();
}
function confirmEmergencyLaunch(n){
  const sel=document.getElementById('emergency-staff-select');
  if(!sel||!sel.value){alert('対応者を選択してください');return;}
  recordEmergencyAccess(sel.value);
  state.emergencyPopupDismissed=false;
  state.showModal=false;
  const name=n===2?state.shortcutName2:state.shortcutName1;
  alert(name+'を起動します\n\n⚠️ 作業後に必ず貸出記録を入力してください！');
  const path=n===2?state.shortcutPath2:state.shortcutPath; if(path)window.open(path);
  render();renderEmergencyPopup();
}
function dismissEmergencyPopup(){state.emergencyPopupDismissed=true;renderEmergencyPopup();}
function clearEmergencyLog(){localStorage.removeItem('emergency_log');state.emergencyPopupDismissed=false;renderEmergencyPopup();}
function renderEmergencyPopup(){
  const log=getEmergencyLog();
  if(!log.length||state.emergencyPopupDismissed){document.getElementById('emergency-popup-container').innerHTML='';return;}
  const l=log[0];
  const dtStr=new Date(l.ts).toLocaleString('ja-JP');
  const staffStr=l.staff?' / 対応者：'+l.staff:'';
  document.getElementById('emergency-popup-container').innerHTML=`
    <div class="emergency-popup"><div class="emergency-popup-inner">
      <div style="font-size:22px;">🚨</div>
      <div class="emergency-popup-text">
        <div class="emergency-popup-title">緊急アクセスの記録があります</div>
        <div class="emergency-popup-sub">最終緊急処理：${dtStr}${staffStr}<br>貸出記録が未入力の可能性があります</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="btn btn-gray" style="font-size:12px;padding:7px 12px;" onclick="dismissEmergencyPopup()">一時非表示</button>
        <button class="btn btn-success" style="font-size:12px;padding:7px 12px;" onclick="clearEmergencyLog()">解除（記録済）</button>
      </div>
    </div></div>`;}

function getAvailableChannels(wardKey){
  if(!wardKey)return[];
  const ward=wardsConfig[wardKey];const available=[];
  ward.monitors.forEach(monitor=>{monitor.channels.forEach(channel=>{
    const isRented=Object.values(state.rentals).some(r=>r.wardKey===wardKey&&r.monitorId===monitor.id&&r.channel===channel);
    if(!isRented)available.push({monitorName:monitor.name,monitorId:monitor.id,channel});
  });});
  return available;
}
function getWardTxId(wardKey,monitorId,channel){
  const key=`${wardKey}-${monitorId}-${channel}`;
  return state.wardTransmitters[key]||`TX-${wardKey}-${monitorId}-${channel}(未登録)`;
}
function isOverdue(d){return(Date.now()-new Date(d).getTime())>OVERDUE_DAYS*86400000;}
function getDaysRented(d){return Math.floor((Date.now()-new Date(d).getTime())/86400000);}

function startRental(){
  state.currentRental={wardKey:'',monitorId:'',channel:'',deviceId:'',staffName:'',transmitterId:'',rentalTxId:'',status:'pending'};
  state.rentalStep=1;state.modalType='rental';state.showModal=true;render();
}
function nextRentalStep(){
  if(state.rentalStep===1){
    if(!state.currentRental.wardKey||!state.currentRental.channel){alert('病棟とチャンネルを選択してください');return;}
    state.rentalStep=2;
  }else if(state.rentalStep===2){
    if(!state.currentRental.deviceId||!state.currentRental.staffName){alert('機器IDと対応者を選択してください');return;}
    state.currentRental.transmitterId=getWardTxId(state.currentRental.wardKey,state.currentRental.monitorId,state.currentRental.channel);
    state.rentalStep=3;
  }else if(state.rentalStep===3){state.rentalStep=4;}
  render();
}
function confirmRental(){
  const id='R'+Date.now();
  state.rentals[id]={...state.currentRental,rentalId:id,rentalDate:new Date().toISOString(),status:'confirmed'};
  saveData();state.showModal=false;render();
}
function launchChannelApp(n){
  const path=n===2?state.shortcutPath2:state.shortcutPath;
  const name=n===2?state.shortcutName2:state.shortcutName1;
  if(!path){alert(name+'が登録されていません\n設定タブから登録してください');return;}
  window.open(path);
}
function startReturn(rentalId){state.currentRental={...state.rentals[rentalId]};state.modalType='return';state.showModal=true;render();}
function confirmReturn(){
  const sel=document.getElementById('return-staff');
  if(!sel||!sel.value){alert('返却者を選択してください');return;}
  const id=state.currentRental.rentalId;
  state.rentalHistory.unshift({...state.rentals[id],returnDate:new Date().toISOString(),returnStaff:sel.value});
  delete state.rentals[id];saveData();state.showModal=false;render();
}

function exportHistoryCSV(){
  if(!state.rentalHistory.length){alert('エクスポートする履歴がありません');return;}
  const headers=['機器ID','病棟','チャンネル','預かり送信機','貸出用送信機','対応者','貸出日時','返却日時','返却者'];
  const rows=state.rentalHistory.map(h=>[
    h.deviceId,wardsConfig[h.wardKey].name,h.channel,
    h.transmitterId||'',h.rentalTxId||'',h.staffName||'',
    new Date(h.rentalDate).toLocaleString('ja-JP'),
    new Date(h.returnDate).toLocaleString('ja-JP'),
    h.returnStaff||''
  ]);
  const csv='\uFEFF'+[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),download:`貸出履歴_${new Date().toISOString().split('T')[0]}.csv`});
  a.click();
}

function addDevice(){const v=document.getElementById('device-id').value.trim();if(!v||state.deviceList.some(d=>d.id===v)){alert(v?'既に登録済み':'機器IDを入力');return;}state.deviceList.push({id:v,type:'ベッドサイドモニタ'});saveData();document.getElementById('device-id').value='';render();}
function removeDevice(id){if(confirm('削除しますか？')){state.deviceList=state.deviceList.filter(d=>d.id!==id);saveData();render();}}
function addStaff(){const v=document.getElementById('staff-name').value.trim();if(!v||state.staffList.includes(v)){alert(v?'既に登録済み':'名前を入力');return;}state.staffList.push(v);saveData();document.getElementById('staff-name').value='';render();}
function removeStaff(name){if(confirm('削除しますか？')){state.staffList=state.staffList.filter(s=>s!==name);saveData();render();}}
function addRentalTx(){const id=document.getElementById('rtx-id').value.trim(),note=document.getElementById('rtx-note').value.trim();if(!id||state.rentalTransmitters.some(t=>t.id===id)){alert(id?'既に登録済み':'送信機IDを入力');return;}state.rentalTransmitters.push({id,note});saveData();document.getElementById('rtx-id').value='';document.getElementById('rtx-note').value='';render();}
function removeRentalTx(id){if(confirm('削除しますか？')){state.rentalTransmitters=state.rentalTransmitters.filter(t=>t.id!==id);saveData();render();}}
function saveWardTx(){const ward=wardsConfig[state.wardTxFilter];ward.monitors.forEach(m=>{m.channels.forEach(ch=>{const key=`${state.wardTxFilter}-${m.id}-${ch}`,el=document.getElementById(`wtx-${key}`);if(el&&el.value.trim())state.wardTransmitters[key]=el.value.trim();});});saveData();alert('保存しました');render();}
function handleShortcutDrop(e,n){e.preventDefault();const f=e.dataTransfer.files;if(f.length){if(n===2)state.shortcutPath2=f[0].path||f[0].name;else state.shortcutPath=f[0].path||f[0].name;saveData();render();}}

function render(){
  const active=Object.values(state.rentals);
  const overdueCount=active.filter(r=>isOverdue(r.rentalDate)).length;
  const canRental=state.deviceList.length>0&&state.staffList.length>0;
  document.getElementById('app').innerHTML=`
    ${checkWeeklyReview()?`<div class="weekly-check-banner">📋 週次チェック！貸出状況を確認してください<button class="btn btn-success" style="padding:7px 14px;font-size:13px;" onclick="markWeeklyCheckDone();render()">確認完了</button></div>`:''}
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;margin-bottom:10px;">
      <div class="title">📱 モニタ貸出管理</div>
      <button class="btn btn-emergency" onclick="openEmergencyModal()">🚨 緊急アクセス</button>
    </div>
    <div class="inline-form-card">
      <div class="inline-form-title">➕ 新規貸出受付</div>
      ${canRental
        ?`<button class="btn btn-primary" style="width:100%;font-size:15px;padding:13px;" onclick="startRental()">新規貸出を開始する</button>`
        :`<div style="color:#9ca3af;text-align:center;padding:10px 0;">設定タブで機器・対応者を登録してください</div>`}
    </div>
    <div class="card">
      <div class="tabs">
        <button class="tab ${state.currentTab==='rental'?'tab-active':''}" onclick="state.currentTab='rental';render()">貸出中 (${active.length})${overdueCount?` <span style="color:#f97316;font-size:12px;">⚠️${overdueCount}件</span>`:''}</button>
        <button class="tab ${state.currentTab==='history'?'tab-active':''}" onclick="state.currentTab='history';render()">履歴</button>
        <button class="tab ${state.currentTab==='list'?'tab-active':''}" onclick="state.currentTab='list';render()">📋 一覧</button>
        <button class="tab ${state.currentTab==='settings'?'tab-active':''}" onclick="state.currentTab='settings';render()">設定</button>
      </div>
      ${state.currentTab==='rental'?renderRentalTab():''}
      ${state.currentTab==='history'?renderHistoryTab():''}
      ${state.currentTab==='list'?renderListTab():''}
      ${state.currentTab==='settings'?renderSettingsTab():''}
    </div>
    ${state.showModal?renderModal():''}`;
}

function renderRentalTab(){
  const active=Object.values(state.rentals).sort((a,b)=>new Date(a.rentalDate)-new Date(b.rentalDate));
  if(!active.length)return`<div style="text-align:center;padding:32px;color:#9ca3af;">現在貸出中の機器はありません</div>`;
  return active.map(r=>{
    const ward=wardsConfig[r.wardKey],ov=isOverdue(r.rentalDate),days=getDaysRented(r.rentalDate);
    return`<div class="rental-card ${ov?'rental-card-overdue':''}" onclick="startReturn('${r.rentalId}')">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px;">
        <div>
          <span style="font-size:17px;font-weight:700;color:#111827;">${r.deviceId}</span>
          ${ov?`<span class="overdue-badge">⚠️ ${days}日経過</span>`:''}
          <div style="font-size:12px;color:#6b7280;margin-top:2px;">${ward.name} — ch ${r.channel}</div>
        </div>
        <span class="rental-status status-${r.status}">${r.status==='confirmed'?'貸出中':'準備中'}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:#374151;">
        <div><strong>対応者:</strong> ${r.staffName}</div>
        <div><strong>預かり送信機:</strong> <span class="tx-badge">${r.transmitterId}</span></div>
        ${r.rentalTxId?`<div><strong>貸出用送信機:</strong> <span class="tx-badge">${r.rentalTxId}</span></div>`:''}
        <div><strong>貸出日時:</strong> ${new Date(r.rentalDate).toLocaleString('ja-JP')}</div>
      </div>
      <div style="font-size:11px;color:#9ca3af;margin-top:8px;text-align:right;">タップして返却処理</div>
    </div>`;
  }).join('');
}

  const wk=state.listWardFilter;

  return`<div>
