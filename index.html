<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>モニタ貸出管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#fef3c7 0%,#fde68a 50%,#fcd34d 100%);min-height:100vh;padding:8px;font-size:14px;}
.container{max-width:1200px;margin:0 auto;}
.card{background:#fff;border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,0.1);padding:16px;margin-bottom:12px;}
.title{font-size:22px;font-weight:900;color:#111827;}
.btn{padding:10px 18px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;transition:all 0.18s;box-shadow:0 2px 6px rgba(0,0,0,0.1);font-family:'Noto Sans JP',sans-serif;}
.btn-primary{background:#f59e0b;color:#fff;}
.btn-primary:hover{background:#d97706;transform:translateY(-1px);}
.btn-primary:disabled{background:#d1d5db;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-success{background:#10b981;color:#fff;}
.btn-success:hover{background:#059669;transform:translateY(-1px);}
.btn-danger{background:#ef4444;color:#fff;}
.btn-danger:hover{background:#dc2626;transform:translateY(-1px);}
.btn-gray{background:#e5e7eb;color:#374151;}
.btn-gray:hover{background:#d1d5db;}
.btn-emergency{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;font-size:15px;padding:14px 24px;border-radius:12px;box-shadow:0 4px 14px rgba(220,38,38,0.45);letter-spacing:0.05em;animation:emergencyPulse 2.5s ease-in-out infinite;}
.btn-emergency:hover{background:linear-gradient(135deg,#b91c1c,#991b1b);transform:translateY(-2px);}
@keyframes emergencyPulse{0%,100%{box-shadow:0 4px 14px rgba(220,38,38,0.45);}50%{box-shadow:0 4px 22px rgba(220,38,38,0.7);}}
.tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:2px solid #e5e7eb;padding-bottom:8px;}
.tab{padding:9px 16px;border:none;background:none;cursor:pointer;font-weight:700;color:#6b7280;border-bottom:3px solid transparent;transition:all 0.18s;font-family:'Noto Sans JP',sans-serif;font-size:13px;}
.tab-active{color:#f59e0b;border-bottom-color:#f59e0b;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:700;color:#374151;margin-bottom:5px;display:block;}
.form-input,.form-select{width:100%;padding:10px 13px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;font-family:'Noto Sans JP',sans-serif;transition:border-color 0.15s;}
.form-input:focus,.form-select:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,0.12);}
.list-item{background:#f9fafb;padding:10px 14px;border-radius:8px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.rental-card{background:#fff;border:2px solid #e5e7eb;border-radius:10px;cursor:pointer;transition:all 0.18s;}
.rental-card:hover{box-shadow:0 4px 14px rgba(0,0,0,0.1);border-color:#f59e0b;}
.rental-card-overdue{border-color:#f97316 !important;background:#fff7ed;}
.rental-status{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;}
.status-pending{background:#fef3c7;color:#92400e;}
.status-confirmed{background:#d1fae5;color:#065f46;}
.overdue-badge{display:inline-block;background:#fed7aa;color:#9a3412;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:6px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;}
.modal-content{background:#fff;border-radius:16px;padding:24px;max-width:600px;width:100%;max-height:92vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:19px;font-weight:700;}
.step-indicator{display:flex;gap:8px;margin-bottom:20px;}
.step{flex:1;text-align:center;padding:10px 4px;border-radius:8px;background:#f3f4f6;font-weight:700;color:#9ca3af;font-size:12px;}
.step-active{background:#fef3c7;color:#92400e;}
.step-complete{background:#d1fae5;color:#065f46;}
.info-box{background:#fffbeb;border:2px solid #fcd34d;border-radius:8px;padding:12px;margin-bottom:14px;}
.emergency-popup{position:fixed;top:0;left:0;right:0;z-index:1000;padding:12px 16px;background:linear-gradient(135deg,#7f1d1d,#991b1b);color:#fff;box-shadow:0 4px 20px rgba(127,29,29,0.5);animation:slideDown 0.35s ease;}
@keyframes slideDown{from{transform:translateY(-100%);}to{transform:translateY(0);}}
.emergency-popup-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.emergency-popup-text{flex:1;min-width:200px;}
.emergency-popup-title{font-size:15px;font-weight:900;margin-bottom:3px;}
.emergency-popup-sub{font-size:12px;opacity:0.85;line-height:1.6;}
.weekly-check-banner{background:#dc2626;color:#fff;padding:14px 16px;border-radius:12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:15px;box-shadow:0 4px 12px rgba(220,38,38,0.3);}
.history-table{width:100%;border-collapse:collapse;margin-top:10px;}
.history-table th{background:#f9fafb;padding:9px 10px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;border-bottom:2px solid #e5e7eb;}
.history-table td{padding:9px 10px;border-bottom:1px solid #f3f4f6;font-size:12px;}
.inline-form-card{background:linear-gradient(135deg,#fff9e6,#fff);border:2px solid #fcd34d;border-radius:14px;padding:18px;margin-bottom:12px;}
.inline-form-title{font-size:16px;font-weight:900;color:#92400e;margin-bottom:14px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.grid-2{grid-template-columns:1fr;}}
.section-label{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.tx-badge{display:inline-block;background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
::placeholder{color:#d1d5db !important;opacity:1;}

/* ===== 選択カード（固定サイズ・チェック右上絶対配置） ===== */
.sel-card{
  border-radius:10px;cursor:pointer;transition:border-color 0.15s,background 0.15s;
  height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  border:2px solid #e5e7eb;background:#f9fafb;position:relative;overflow:hidden;
}
.sel-card:hover:not(.sel-disabled){border-color:#f59e0b;}
.sel-card.sel-selected{border-color:#f59e0b;background:#fffbeb;}
.sel-card.sel-disabled{opacity:0.45;cursor:not-allowed;}
.sel-card .sc-label{font-weight:700;font-size:13px;color:#374151;line-height:1.2;text-align:center;padding:0 4px;}
.sel-card.sel-selected .sc-label{color:#92400e;}
.sel-card .sc-sub{font-size:10px;color:#9ca3af;line-height:1.1;text-align:center;padding:0 4px;}
.sel-card .sc-check{position:absolute;top:3px;right:5px;font-size:10px;color:#f59e0b;font-weight:900;display:none;}
.sel-card.sel-selected .sc-check{display:block;}

/* 病棟カード: 未選択は薄色、選択は濃い背景＋白文字 */
.wc-W7{background:#f5f3ff;border-color:#c4b5fd;}
.wc-W7.sel-selected{background:#7c3aed;border-color:#5b21b6;}
.wc-W7.sel-selected .sc-label{color:#fff;}.wc-W7.sel-selected .sc-sub{color:rgba(255,255,255,0.8);}.wc-W7.sel-selected .sc-check{color:#fff;}

.wc-W6{background:#f0fdf4;border-color:#86efac;}
.wc-W6.sel-selected{background:#16a34a;border-color:#15803d;}
.wc-W6.sel-selected .sc-label{color:#fff;}.wc-W6.sel-selected .sc-sub{color:rgba(255,255,255,0.8);}.wc-W6.sel-selected .sc-check{color:#fff;}
.wc-E6{background:#f0fdfa;border-color:#5eead4;}
.wc-E6.sel-selected{background:#0d9488;border-color:#0f766e;}
.wc-E6.sel-selected .sc-label{color:#fff;}.wc-E6.sel-selected .sc-sub{color:rgba(255,255,255,0.8);}.wc-E6.sel-selected .sc-check{color:#fff;}
.wc-W5{background:#fff7ed;border-color:#fdba74;}
.wc-W5.sel-selected{background:#ea580c;border-color:#c2410c;}
.wc-W5.sel-selected .sc-label{color:#fff;}.wc-W5.sel-selected .sc-sub{color:rgba(255,255,255,0.8);}.wc-W5.sel-selected .sc-check{color:#fff;}
.wc-E5{background:#fdf2f8;border-color:#f0abfc;}
.wc-E5.sel-selected{background:#db2777;border-color:#be185d;}
.wc-E5.sel-selected .sc-label{color:#fff;}.wc-E5.sel-selected .sc-sub{color:rgba(255,255,255,0.8);}.wc-E5.sel-selected .sc-check{color:#fff;}

/* 送信機カード */
.txc{background:#f9fafb;border:2px solid #e5e7eb;}
.txc.sel-selected{background:#fffbeb;border-color:#f59e0b;}
.txc.sel-selected .sc-label{color:#92400e;}
.txc-temp{background:#fafafa;border:2px dashed #d1d5db;}
.txc-temp.sel-selected{background:#f5f3ff;border-color:#8b5cf6;}
.txc-temp.sel-selected .sc-label{color:#6d28d9;}
.txc-temp.sel-selected .sc-check{color:#8b5cf6;}

/* スタッフカード */
.stfc{background:#f9fafb;border:2px solid #e5e7eb;height:52px;}
.stfc.sel-selected{background:#ecfdf5;border-color:#10b981;}
.stfc.sel-selected .sc-label{color:#065f46;}
.stfc.sel-selected .sc-check{color:#10b981;}

/* 一覧タブ */
.list-row-rented{background:#fff3e0 !important;border-left:4px solid #f97316;}
.list-tx-id{font-size:14px;font-weight:900;color:#1e40af;}
.list-ch-rented{font-size:14px;font-weight:900;color:#ea580c;}
.list-ch-free{font-size:13px;font-weight:700;color:#374151;}
.list-model-badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:700;white-space:nowrap;}
.m-zs91{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;}
.m-zs63{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;}
.m-zs62{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;}
.m-zs61{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd;}
.m-lx{background:#fce7f3;color:#9d174d;border:1px solid #f9a8d4;}
.m-other{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;}
.list-rented-tx{display:inline-block;background:#ffedd5;color:#9a3412;border:1px solid #fed7aa;border-radius:5px;font-size:12px;font-weight:700;padding:2px 8px;}
.list-free-dot{color:#10b981;font-size:11px;font-weight:600;}
.list-ward-chip{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;}

/* 貸出送信機マスター */
.rtx-edit-row{background:#f9fafb;border-radius:8px;margin-bottom:7px;display:flex;align-items:center;gap:8px;padding:8px 10px;flex-wrap:wrap;}
.rtx-edit-input{flex:1;min-width:80px;padding:7px 10px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;transition:border-color 0.15s;}
.rtx-edit-input:focus{outline:none;border-color:#f59e0b;}
.rtx-note-input{flex:2;min-width:100px;padding:7px 10px;border:2px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:#6b7280;}
.rtx-note-input:focus{outline:none;border-color:#f59e0b;}
</style>

  showModal:false,modalType:'',rentalStep:1,
  currentRental:{wardKey:'',monitorId:'',channel:'',deviceId:'',staffName:'',transmitterId:'',rentalTxId:'',status:'pending'},

function loadData(){
  const m={rental_devices:'deviceList',rental_staff:'staffList',rental_active:'rentals',rental_history:'rentalHistory',rental_tx_master:'rentalTransmitters',ward_tx_master:'wardTransmitters'};
  Object.entries(m).forEach(([k,p])=>{const v=localStorage.getItem(k);if(v)state[p]=JSON.parse(v);});
  state.shortcutPath=localStorage.getItem('rental_shortcut')||'';
  state.shortcutName1=localStorage.getItem('rental_shortcut_name1')||'アプリA';
  state.shortcutPath2=localStorage.getItem('rental_shortcut2')||'';
  state.shortcutName2=localStorage.getItem('rental_shortcut_name2')||'アプリB';
  // 未登録キーをデフォルト値で補完（手動編集済みのキーは上書きしない）
  let updated=false;
  Object.entries(DEFAULT_WARD_TX).forEach(([k,v])=>{if(!state.wardTransmitters[k]){state.wardTransmitters[k]=v;updated=true;}});
  if(updated)localStorage.setItem('ward_tx_master',JSON.stringify(state.wardTransmitters));
}
function saveData(){
  localStorage.setItem('rental_devices',JSON.stringify(state.deviceList));
  localStorage.setItem('rental_staff',JSON.stringify(state.staffList));
  localStorage.setItem('rental_shortcut',state.shortcutPath);
  localStorage.setItem('rental_shortcut_name1',state.shortcutName1);
  localStorage.setItem('rental_shortcut2',state.shortcutPath2);
  localStorage.setItem('rental_shortcut_name2',state.shortcutName2);
  localStorage.setItem('rental_active',JSON.stringify(state.rentals));
  localStorage.setItem('rental_history',JSON.stringify(state.rentalHistory));
  localStorage.setItem('rental_tx_master',JSON.stringify(state.rentalTransmitters));
  localStorage.setItem('ward_tx_master',JSON.stringify(state.wardTransmitters));
}

function checkWeeklyReview(){
  return new Date().getDay()===6&&localStorage.getItem('rental_last_weekly_check')!==new Date().toISOString().split('T')[0];
}
function markWeeklyCheckDone(){localStorage.setItem('rental_last_weekly_check',new Date().toISOString().split('T')[0]);}

function getEmergencyLog(){return JSON.parse(localStorage.getItem('emergency_log')||'[]');}
function recordEmergencyAccess(staff){
  const log=getEmergencyLog();
  log.unshift({ts:new Date().toISOString(),staff});
  localStorage.setItem('emergency_log',JSON.stringify(log.slice(0,20)));
}
function openEmergencyModal(){
  if(!state.shortcutPath&&!state.shortcutPath2){alert('チャンネル変更アプリが登録されていません\n設定タブから登録してください');return;}
  state.modalType='emergency';state.showModal=true;render();
}
function confirmEmergencyLaunch(n){
  if(!state.emergencyStaff){alert('対応者を選択してください');return;}
  recordEmergencyAccess(state.emergencyStaff);
  state.emergencyPopupDismissed=false;
  state.showModal=false;
  const path=n===2?state.shortcutPath2:state.shortcutPath;
  const name=n===2?state.shortcutName2:state.shortcutName1;
  if(path){const a=document.createElement('a');a.href=path;document.body.appendChild(a);a.click();document.body.removeChild(a);}
  else alert(name+'が登録されていません');
  render();renderEmergencyPopup();
}
function dismissEmergencyPopup(){state.emergencyPopupDismissed=true;renderEmergencyPopup();}
function clearEmergencyLog(){localStorage.removeItem('emergency_log');state.emergencyPopupDismissed=false;renderEmergencyPopup();}
function renderEmergencyPopup(){
  const log=getEmergencyLog();
  if(!log.length||state.emergencyPopupDismissed){document.getElementById('emergency-popup-container').innerHTML='';return;}
  const l=log[0];
  const dtStr=new Date(l.ts).toLocaleString('ja-JP');
  const staffStr=l.staff?' / 対応者：'+l.staff:'';
  document.getElementById('emergency-popup-container').innerHTML=`
    <div class="emergency-popup"><div class="emergency-popup-inner">
      <div style="font-size:22px;">🚨</div>
      <div class="emergency-popup-text">
        <div class="emergency-popup-title">緊急アクセスの記録があります</div>
        <div class="emergency-popup-sub">最終緊急処理：${dtStr}${staffStr}<br>貸出記録が未入力の可能性があります</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="btn btn-gray" style="font-size:12px;padding:7px 12px;" onclick="dismissEmergencyPopup()">一時非表示</button>
        <button class="btn btn-success" style="font-size:12px;padding:7px 12px;" onclick="clearEmergencyLog()">解除（記録済）</button>
      </div>
    </div></div>`;}

function getAvailableChannels(wardKey){
  if(!wardKey)return[];
  const ward=wardsConfig[wardKey];const available=[];
  ward.monitors.forEach(monitor=>{monitor.channels.forEach(channel=>{
    const isRented=Object.values(state.rentals).some(r=>r.wardKey===wardKey&&r.monitorId===monitor.id&&r.channel===channel);
    if(!isRented)available.push({monitorName:monitor.name,monitorId:monitor.id,channel});
  });});
  return available;
}
function getWardTxId(wardKey,monitorId,channel){
  const key=`${wardKey}-${monitorId}-${channel}`;
  return state.wardTransmitters[key]||`TX-${wardKey}-${monitorId}-${channel}(未登録)`;
}
function isOverdue(d){return(Date.now()-new Date(d).getTime())>OVERDUE_DAYS*86400000;}
function getDaysRented(d){return Math.floor((Date.now()-new Date(d).getTime())/86400000);}

function validateChannel(){
  const wk=state.currentRental.wardKey;
  const ch=state.currentRental.channel;
  if(!ch){state.chError='チャンネル番号を入力してください';render();return;}
  const ward=wardsConfig[wk];
  let found=null;
  ward.monitors.forEach(m=>{if(m.channels.includes(ch))found=m;});
  if(!found){
    // 存在しないチャンネル
    state.chError=`ch ${ch} は${ward.name}に存在しません`;
    state.currentRental.monitorId='';render();return;
  }
  // 貸出中チェック
  const isRented=Object.values(state.rentals).some(r=>r.wardKey===wk&&r.channel===ch);
  if(isRented){
    state.chError=`ch ${ch} は現在貸出中です`;
    state.currentRental.monitorId='';render();return;
  }
  state.chError='';
  state.currentRental.monitorId=found.id;
  render();
}

function startRental(){
  state.currentRental={wardKey:'',monitorId:'',channel:'',deviceId:'',staffName:'',transmitterId:'',rentalTxId:'',returnStaff:'',status:'pending'};
  state.chError='';state.showChList=false;
  state.rentalStep=1;state.modalType='rental';state.showModal=true;render();
}
function nextRentalStep(){
  if(state.rentalStep===1){
    if(!state.currentRental.wardKey){alert('病棟を選択してください');return;}
    if(!state.currentRental.channel){state.chError='チャンネル番号を入力してください';render();return;}
    if(!state.currentRental.monitorId){
      // まだ確認ボタンを押していない場合は自動でバリデーション
      validateChannel();
      if(!state.currentRental.monitorId)return;
    }
    state.rentalStep=2;
  }else if(state.rentalStep===2){
    if(!state.currentRental.staffName){alert('対応者を選択してください');return;}
    state.currentRental.deviceId=state.currentRental.rentalTxId||'—';
    state.currentRental.transmitterId=getWardTxId(state.currentRental.wardKey,state.currentRental.monitorId,state.currentRental.channel);
    state.rentalStep=3;
  }else if(state.rentalStep===3){state.rentalStep=4;}
  render();
}
function confirmRental(){
  const id='R'+Date.now();
  state.rentals[id]={...state.currentRental,rentalId:id,rentalDate:new Date().toISOString(),status:'confirmed'};
  saveData();state.showModal=false;render();
}
function launchChannelApp(n){
  const path=n===2?state.shortcutPath2:state.shortcutPath;
  const name=n===2?state.shortcutName2:state.shortcutName1;
  if(!path){alert(name+'が登録されていません\n設定タブから登録してください');return;}
  const a=document.createElement('a');
  a.href=path;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
function startReturn(rentalId){state.currentRental={...state.rentals[rentalId]};state.modalType='return';state.showModal=true;render();}
function confirmReturn(){
  const staff=state.currentRental.returnStaff;
  if(!staff){alert('返却者を選択してください');return;}
  const id=state.currentRental.rentalId;
  state.rentalHistory.unshift({...state.rentals[id],returnDate:new Date().toISOString(),returnStaff:staff});
  delete state.rentals[id];saveData();state.showModal=false;render();
}

function exportHistoryCSV(){
  if(!state.rentalHistory.length){alert('エクスポートする履歴がありません');return;}
  const headers=['機器ID','病棟','チャンネル','預かり送信機','貸出用送信機','対応者','貸出日時','返却日時','返却者'];
  const rows=state.rentalHistory.map(h=>[
    h.deviceId,wardsConfig[h.wardKey].name,h.channel,
    h.transmitterId||'',h.rentalTxId||'',h.staffName||'',
    new Date(h.rentalDate).toLocaleString('ja-JP'),
    new Date(h.returnDate).toLocaleString('ja-JP'),
    h.returnStaff||''
  ]);
  const csv='\uFEFF'+[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),download:`貸出履歴_${new Date().toISOString().split('T')[0]}.csv`});
  a.click();
}

function addDevice(){const v=document.getElementById('device-id').value.trim();if(!v||state.deviceList.some(d=>d.id===v)){alert(v?'既に登録済み':'機器IDを入力');return;}state.deviceList.push({id:v,type:'ベッドサイドモニタ'});saveData();document.getElementById('device-id').value='';render();}
function removeDevice(id){if(confirm('削除しますか？')){state.deviceList=state.deviceList.filter(d=>d.id!==id);saveData();render();}}
function addStaff(){const v=document.getElementById('staff-name').value.trim();if(!v||state.staffList.includes(v)){alert(v?'既に登録済み':'名前を入力');return;}state.staffList.push(v);saveData();document.getElementById('staff-name').value='';render();}
function removeStaff(name){if(confirm('削除しますか？')){state.staffList=state.staffList.filter(s=>s!==name);saveData();render();}}
function addRentalTx(){const id=document.getElementById('rtx-id').value.trim(),note=document.getElementById('rtx-note').value.trim();if(!id||state.rentalTransmitters.some(t=>t.id===id)){alert(id?'既に登録済み':'送信機IDを入力');return;}state.rentalTransmitters.push({id,note});saveData();document.getElementById('rtx-id').value='';document.getElementById('rtx-note').value='';render();}
function removeRentalTx(id){if(confirm('削除しますか？')){state.rentalTransmitters=state.rentalTransmitters.filter(t=>t.id!==id);saveData();render();}}
function saveWardTx(){const ward=wardsConfig[state.wardTxFilter];ward.monitors.forEach(m=>{m.channels.forEach(ch=>{const key=`${state.wardTxFilter}-${m.id}-${ch}`,el=document.getElementById(`wtx-${key}`);if(el&&el.value.trim())state.wardTransmitters[key]=el.value.trim();});});saveData();alert('保存しました');render();}
function saveShortcutPath(n){
  const el=document.getElementById('spath'+n);
  if(!el)return;
  const val=el.value.trim();
  if(n===2)state.shortcutPath2=val; else state.shortcutPath=val;
  saveData();render();
}
function handleShortcutDrop(e,n){e.preventDefault();}

function renderSettingsApp(){
  const log=getEmergencyLog();
  const slot=(n)=>{
    const path=n===2?state.shortcutPath2:state.shortcutPath;
    const pathKey=n===2?'shortcutPath2':'shortcutPath';
    const nameKey=n===2?'shortcutName2':'shortcutName1';
    const nameVal=n===2?state.shortcutName2:state.shortcutName1;
    return`<div style="margin-bottom:20px;background:#f9fafb;border-radius:12px;padding:14px;">
      <div style="font-weight:700;font-size:13px;color:#374151;margin-bottom:10px;">アプリ${n}</div>

        <label class="form-label">アプリ名</label>

          placeholder="例: WEP用" oninput="state.${nameKey}=this.value;saveData()">

      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">起動URL <span style="font-weight:400;color:#6b7280;">（カスタムURLスキーム）</span></label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="spath${n}" class="form-input" style="font-size:14px;font-weight:600;"
            value="${path}" placeholder="例: qi901p://">
          <button class="btn btn-primary" style="white-space:nowrap;" onclick="saveShortcutPath(${n})">保存</button>
        </div>
        <div style="font-size:11px;color:#9ca3af;margin-top:5px;">
          .regファイルで登録したスキーム名://　を入力してください
        </div>
        ${path?`<div style="margin-top:6px;display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;color:#059669;font-weight:700;">✓ 登録済み: ${path}</span>
          <button class="btn btn-danger" style="padding:4px 10px;font-size:11px;" onclick="state.${pathKey}='';saveData();render()">削除</button>
        </div>`:''}
      </div>
    </div>`;
  };
  return`<div>
  <div class="section-label">チャンネル変更アプリ</div>
  ${slot(1)}${slot(2)}
  <div style="margin-top:20px;"><div class="section-label">緊急アクセス履歴</div>

  </div></div>`;}

      <div class="step ${state.rentalStep>=3?'step-active':''}">3.送信機預かり</div>
      <div class="step ${state.rentalStep===4?'step-active':''}">4.確定</div>
    </div>
    ${state.rentalStep===1?`
      ${state.rentalTransmitters.length?`
      <div class="form-group">
        <label class="form-label">📡 貸出用送信機</label>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;">
          ${state.rentalTransmitters.map(t=>{
            const inUse=Object.values(state.rentals).some(r=>r.rentalTxId===t.id);
            const sel=state.currentRental.rentalTxId===t.id;
            return`<div onclick="${inUse?'':(`state.currentRental.rentalTxId='${t.id}';render()`)}"
              style="border:2px solid ${sel?'#f59e0b':inUse?'#e5e7eb':'#e5e7eb'};border-radius:10px;padding:12px 8px;text-align:center;
              cursor:${inUse?'not-allowed':'pointer'};background:${sel?'#fffbeb':inUse?'#f3f4f6':'#fff'};
              opacity:${inUse?'0.5':'1'};transition:all 0.15s;">
              <div style="font-weight:700;font-size:15px;color:${sel?'#92400e':inUse?'#9ca3af':'#374151'};">${t.id}</div>
              ${t.note?`<div style="font-size:11px;color:#9ca3af;margin-top:2px;">${t.note}</div>`:''}
              ${inUse?`<div style="font-size:10px;color:#9ca3af;font-weight:700;margin-top:3px;">貸出中</div>`:''}
              ${sel&&!inUse?`<div style="font-size:10px;color:#f59e0b;font-weight:700;margin-top:3px;">✓</div>`:''}
            </div>`;
          }).join('')}
          <div onclick="state.currentRental.rentalTxId='臨時';render()"
            style="border:2px dashed ${state.currentRental.rentalTxId==='臨時'?'#8b5cf6':'#d1d5db'};border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;background:${state.currentRental.rentalTxId==='臨時'?'#f5f3ff':'#fff'};transition:all 0.15s;">
            <div style="font-weight:700;font-size:15px;color:${state.currentRental.rentalTxId==='臨時'?'#6d28d9':'#9ca3af'};">臨時</div>
            <div style="font-size:10px;color:#9ca3af;margin-top:2px;">追加貸出用</div>
            ${state.currentRental.rentalTxId==='臨時'?`<div style="font-size:10px;color:#8b5cf6;font-weight:700;margin-top:3px;">✓</div>`:''}
          </div>
        </div>
        ${state.currentRental.rentalTxId==='臨時'?`
        <input type="text" class="form-input" style="margin-top:8px;font-size:14px;" placeholder="臨時送信機の識別名（任意）"
          oninput="state.currentRental.rentalTxNote=this.value;">
        `:''}
      </div>`:''}
      <div class="form-group">
        <label class="form-label">🏥 貸出病棟</label>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
          ${wardKeys.map(wk=>`<div class="sel-card wc-${wk} ${state.currentRental.wardKey===wk?'sel-selected':''}"
            onclick="state.currentRental.wardKey='${wk}';state.currentRental.channel='';state.currentRental.monitorId='';state.chError='';state.showChList=false;render()">
            <div class="sc-label">${wardsConfig[wk].name.replace('病棟','')}</div>
            <div class="sc-sub">病棟</div>
            <div class="sc-check">✓</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">📺 チャンネル番号を入力</label>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div>
            <input type="text" id="ch-input" class="form-input" style="font-size:22px;font-weight:700;letter-spacing:0.08em;max-width:180px;"
              placeholder="例: 2006"
              value="${state.currentRental.channel||''}"
              oninput="state.currentRental.channel=this.value.trim();state.currentRental.monitorId='';state.chError='';state.showChList=false;"
              onkeydown="if(event.key==='Enter'){nextRentalStep();}">
            ${state.chError?`<div style="color:#dc2626;font-size:13px;font-weight:700;margin-top:6px;">⚠️ ${state.chError}</div>`:''}
            ${state.currentRental.monitorId?`<div style="color:#059669;font-size:13px;font-weight:700;margin-top:6px;">✓ モニタ${wardsConfig[state.currentRental.wardKey].monitors.find(m=>m.id===state.currentRental.monitorId)?.name||''} — OK</div>`:''}
          </div>
          ${state.currentRental.wardKey?`<button class="btn btn-gray" style="white-space:nowrap;font-size:13px;padding:10px 14px;" onclick="state.showChList=!state.showChList;render()">
            ${state.showChList?'▲ 閉じる':'📋 ch一覧'}
          </button>`:`<button class="btn btn-gray" style="white-space:nowrap;font-size:13px;padding:10px 14px;opacity:0.4;cursor:not-allowed;">📋 ch一覧</button>`}
        </div>
        ${state.showChList&&state.currentRental.wardKey?`
        <div style="margin-top:10px;background:#fff;border:2px solid #e2e8f0;border-radius:12px;padding:12px;max-height:260px;overflow-y:auto;">
          ${wardsConfig[state.currentRental.wardKey].monitors.map(m=>{
            return`<div style="margin-bottom:12px;">
              <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;padding:3px 8px;background:#f3f4f6;border-radius:6px;display:inline-block;">モニタ ${m.name}</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px;">
                ${m.channels.map(ch=>{
                  const rented=Object.values(state.rentals).some(r=>r.wardKey===state.currentRental.wardKey&&r.channel===ch);
                  const isFree=ch==='フリー';
                  const isSelected=state.currentRental.channel===ch;
                  return`<span onclick="${rented||isFree?'':(`state.currentRental.channel='${ch}';state.currentRental.monitorId=${m.id};state.chError='';state.showChList=false;render()`)}"
                    style="display:inline-block;padding:6px 13px;border-radius:8px;font-size:15px;font-weight:900;letter-spacing:0.04em;
                    cursor:${rented||isFree?'default':'pointer'};
                    background:${isSelected?'#f59e0b':rented?'#fecaca':isFree?'#f3f4f6':'#eff6ff'};
                    color:${isSelected?'#fff':rented?'#7f1d1d':isFree?'#d1d5db':'#1e3a8a'};
                    border:2px solid ${isSelected?'#d97706':rented?'#f87171':isFree?'#e5e7eb':'#bfdbfe'};
                    opacity:${rented?'0.7':'1'};
                    text-decoration:${rented?'line-through':'none'};">
                    ${ch}
                  </span>`;
                }).join('')}
              </div>
            </div>`;
          }).join('')}
        </div>`:''}
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:14px;" onclick="nextRentalStep()">次へ</button>`:''}
    ${state.rentalStep===2?`
      <div class="info-box" style="font-size:13px;line-height:1.8;">
        📍 <strong>${wardsConfig[state.currentRental.wardKey].name}</strong> — ch <strong>${state.currentRental.channel}</strong>
        ${state.currentRental.rentalTxId?` ／ 送信機: <strong>${state.currentRental.rentalTxId}</strong>`:''}
      </div>
      <div class="form-group">
        <label class="form-label">👤 対応者</label>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;">
          ${state.staffList.map(s=>`<div class="sel-card stfc ${state.currentRental.staffName===s?'sel-selected':''}" onclick="state.currentRental.staffName='${s}';render()">
            <div class="sc-label">${s}</div><div class="sc-check">✓</div>
          </div>`).join('')}
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn btn-gray" style="flex:1;" onclick="state.rentalStep=1;render()">戻る</button>
        <button class="btn btn-primary" style="flex:1;" onclick="nextRentalStep()">次へ</button>
      </div>`:''}
    ${state.rentalStep===3?`
      <div class="info-box">
        <div style="margin-bottom:6px;"><strong>機器:</strong> ${state.currentRental.deviceId}</div>
        <div style="margin-bottom:6px;"><strong>設定チャンネル:</strong> ${state.currentRental.channel}</div>
        <div style="margin-bottom:6px;"><strong>貸出用送信機:</strong> <span class="tx-badge">${state.currentRental.rentalTxId||'未選択'}</span></div>
        <div><strong>預かり病棟送信機:</strong> <span class="tx-badge">${getWardTxId(state.currentRental.wardKey,state.currentRental.monitorId,state.currentRental.channel)}</span></div>
      </div>
      <div style="background:#fef3c7;padding:14px;border-radius:8px;margin-bottom:14px;">
        <p style="font-weight:700;margin-bottom:10px;">⚠️ 必ず以下の手順で作業してください</p>
        <ol style="margin-left:20px;line-height:1.9;font-size:13px;">
          <li>下のボタンでチャンネル変更アプリを起動</li>
          <li>貸出用送信機 (${state.currentRental.rentalTxId||'—'}) をチャンネル ${state.currentRental.channel} に設定</li>
          <li>病棟の送信機を預かる</li>
        </ol>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        ${state.shortcutPath?`<button class="btn btn-success" style="flex:1;" onclick="launchChannelApp(1)">🔧 ${state.shortcutName1}</button>`:''}
        ${state.shortcutPath2?`<button class="btn btn-success" style="flex:1;background:#0891b2;" onclick="launchChannelApp(2)">🔧 ${state.shortcutName2}</button>`:''}
        ${!state.shortcutPath&&!state.shortcutPath2?`<div style="color:#9ca3af;font-size:13px;padding:10px 0;">設定タブでアプリを登録してください</div>`:''}
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-gray" style="flex:1;" onclick="state.rentalStep=2;render()">戻る</button>
        <button class="btn btn-primary" style="flex:1;" onclick="nextRentalStep()">作業完了</button>
      </div>`:''}
    ${state.rentalStep===4?`
      <div class="info-box"><h4 style="font-weight:700;margin-bottom:10px;">貸出内容確認</h4>
        <div style="line-height:2;font-size:13px;">
          <div><strong>病棟:</strong> ${wardsConfig[state.currentRental.wardKey].name}</div>
          <div><strong>チャンネル:</strong> ${state.currentRental.channel}</div>
          <div><strong>貸出機器:</strong> ${state.currentRental.deviceId}</div>
          <div><strong>貸出用送信機:</strong> <span class="tx-badge">${state.currentRental.rentalTxId||'—'}</span></div>
          <div><strong>対応者:</strong> ${state.currentRental.staffName}</div>
          <div><strong>預かり送信機:</strong> <span class="tx-badge">${state.currentRental.transmitterId}</span></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-gray" style="flex:1;" onclick="state.rentalStep=3;render()">戻る</button>
        <button class="btn btn-success" style="flex:1;" onclick="confirmRental()">✓ 貸出確定</button>
      </div>`:''}
  </div></div>`;}

function renderReturnModal(){
  const ward=wardsConfig[state.currentRental.wardKey];
  return`<div class="modal"><div class="modal-content">
    <div class="modal-header"><h3 class="modal-title">返却処理</h3><button class="btn btn-gray" onclick="state.showModal=false;render()">✕</button></div>
    <div class="info-box">
      <div style="margin-bottom:6px;"><strong>機器:</strong> ${state.currentRental.deviceId}</div>
      <div style="margin-bottom:6px;"><strong>病棟:</strong> ${ward.name}</div>
      <div style="margin-bottom:6px;"><strong>チャンネル:</strong> ${state.currentRental.channel}</div>
      ${state.currentRental.rentalTxId?`<div style="margin-bottom:6px;"><strong>貸出用送信機:</strong> <span class="tx-badge">${state.currentRental.rentalTxId}</span></div>`:''}
      <div><strong>預かり送信機:</strong> <span class="tx-badge">${state.currentRental.transmitterId}</span></div>
    </div>
    <div style="background:#fef3c7;padding:14px;border-radius:8px;margin-bottom:14px;">
      <p style="font-weight:700;margin-bottom:8px;">⚠️ 返却時の確認事項</p>
      <ul style="margin-left:20px;line-height:1.9;font-size:13px;">
        <li>貸出機器 (${state.currentRental.deviceId}) を回収</li>
        <li>預かっていた送信機 (${state.currentRental.transmitterId}) を病棟に返却</li>
        ${state.currentRental.rentalTxId?`<li>貸出用送信機 (${state.currentRental.rentalTxId}) を回収</li>`:''}
      </ul>
    </div>
    <div class="form-group"><label class="form-label">👤 返却者</label>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;">
        ${state.staffList.map(s=>`<div onclick="state.currentRental.returnStaff='${s}';render()"
          style="border:2px solid ${state.currentRental.returnStaff===s?'#10b981':'#e5e7eb'};border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;background:${state.currentRental.returnStaff===s?'#ecfdf5':'#fff'};transition:all 0.15s;">
          <div style="font-weight:700;font-size:14px;color:${state.currentRental.returnStaff===s?'#065f46':'#374151'};">${s}</div>
          ${state.currentRental.returnStaff===s?`<div style="font-size:10px;color:#10b981;font-weight:700;margin-top:3px;">✓</div>`:''}
        </div>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn btn-gray" style="flex:1;" onclick="state.showModal=false;render()">キャンセル</button>
      <button class="btn btn-success" style="flex:1;" onclick="confirmReturn()">✓ 返却完了</button>
    </div>
  </div></div>`;}

window.addEventListener('load',()=>{loadData();render();renderEmergencyPopup();});
</script>
</body>
</html>
